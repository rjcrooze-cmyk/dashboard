<style>
:root{ color-scheme: light; --bg:#faf9f7; --card:#ffffff; --ink:#1f2328; --muted:#6b7280; --line:#e7e5e1; --accent:#3b6ea5; --accent2:#7a5cc4; --chip:#f1efea; --good:#2f7d5b; }
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.wrap{max-width:760px;margin:0 auto;padding:18px 16px 60px}
header{display:flex;flex-direction:column;gap:10px;margin-bottom:6px}
.titlerow{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
h1{font-size:20px;margin:0;letter-spacing:-.2px}
.date{color:var(--muted);font-size:13px}
.title-right{display:flex;align-items:center;gap:10px}
.update-all{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap}
.update-all:hover{opacity:.92}
.update-all:disabled{opacity:.6;cursor:default}
.update-status{color:var(--accent);font-size:12.5px;margin-top:2px;min-height:0}
.update-status:empty{display:none}
.affirm{background:linear-gradient(90deg,#f3effa,#eef4fb);border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:14px;display:flex;align-items:center;gap:10px}
.affirm b{font-weight:600}
.affirm .a-text{flex:1}
.icon-btn{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:3px 8px;cursor:pointer;font-size:13px;color:var(--muted)}
.icon-btn:hover{color:var(--ink);border-color:#d8d5cf}
nav.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:14px 0 16px;border-bottom:1px solid var(--line);padding-bottom:10px}
.tab{display:inline-flex;align-items:center;gap:6px;border:1px solid transparent;background:transparent;border-radius:999px;padding:6px 13px;cursor:pointer;font-size:13.5px;color:var(--muted)}
.tab .ico{font-size:14px;line-height:1}
.tab:hover{color:var(--ink)}
.tab.active{background:var(--ink);color:#fff}
.panel{display:none;animation:fade .2s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.grp{margin:0 0 22px}
.grp h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 10px;font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px}
.card .t{font-weight:600;font-size:15px;margin:0 0 4px}
.card .t a{color:var(--ink);text-decoration:none}
.card .t a:hover{text-decoration:underline}
.card .s{color:#3a3f45;margin:0}
.ts-tag{display:inline-block;background:#eef4fb;color:var(--accent);font-size:10.5px;padding:1px 8px;border-radius:6px;margin:0 0 6px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.ts-seen{color:var(--muted);font-size:11.5px;margin:6px 0 0}
.ts-seen b{color:#5a6473;font-weight:600}
.msg-card{background:linear-gradient(135deg,#f3effa,#eef4fb);border:1px solid var(--line);border-left:4px solid var(--accent2);border-radius:14px;padding:16px 18px;margin-bottom:14px}
.msg-author{font-weight:700;font-size:12.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--accent2);margin-bottom:9px}
.msg-title{font-weight:500;color:var(--muted);font-size:12px;text-transform:none;letter-spacing:0}
.msg-body{margin:0;font-size:15.5px;line-height:1.62;color:#2a2f35}
.msg-link{margin-top:11px}
.msg-link a{font-size:12.5px;color:var(--accent);text-decoration:none}
.msg-link a:hover{text-decoration:underline}
.eli{background:#fbf7ee;border:1px dashed #e3d9c2;border-radius:9px;padding:7px 10px;margin-top:8px;font-size:13.5px;color:#5a4e33}
.eli b{color:#7a6a3f}
.pts{margin-top:9px;border:1px solid var(--line);border-radius:9px;background:#fbfbfa;overflow:hidden}
.pts>summary{cursor:pointer;list-style:none;padding:8px 12px;font-size:13px;font-weight:600;color:var(--accent);user-select:none}
.pts>summary::-webkit-details-marker{display:none}
.pts>summary::after{content:"  ▾";color:var(--muted);font-weight:400}
.pts[open]>summary::after{content:"  ▴"}
.pts[open]>summary{border-bottom:1px solid var(--line)}
.pt{padding:8px 12px;border-top:1px solid var(--line);font-size:13.5px}
.pt:first-of-type{border-top:none}
.pt .pt-t{font-weight:600;color:var(--ink)}
.pt .pt-s{display:block;color:#3a3f45;margin-top:2px}
.tw{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-top:1px solid var(--line)}
.tw:first-of-type{border-top:none}
.tw a.tw-time{flex:0 0 auto;background:#eef4fb;color:var(--accent);font-size:11.5px;font-weight:700;padding:2px 8px;border-radius:6px;text-decoration:none;font-variant-numeric:tabular-nums;margin-top:2px}
.tw a.tw-time:hover{background:#dce8f6}
.tw .tw-body{flex:1}
.tw .tw-ctx{color:var(--muted);font-size:13px;margin:0 0 2px}
.tw .tw-said{margin:0;font-size:14.5px;color:#1f2328}
a.thumb-link{display:block;position:relative;margin:0 0 10px}
a.thumb-link .thumb{display:block;width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:10px;background:#ece9e4}
a.thumb-link .play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;pointer-events:none}
a.thumb-link .play::after{content:"";border-style:solid;border-width:9px 0 9px 15px;border-color:transparent transparent transparent #fff;margin-left:3px}
.msg-thumb{display:block;width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:10px;margin:0 0 11px;background:#ece9e4}
.more{margin-top:6px}
.more .exp{background:#f6f8fb;border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:7px 11px;margin:7px 0 0;font-size:13.5px;color:#2a2f35}
.more .exp.loading{color:var(--muted);font-style:italic}
.more .exp.qa{border-left-color:var(--accent2);background:#f7f4fc}
.more .exp.qa .q{display:block;font-weight:600;color:#5a4e7a;margin-bottom:3px}
.card-actions{display:flex;gap:8px;margin-top:9px}
.mini{border:1px solid var(--line);background:var(--chip);border-radius:7px;padding:3px 10px;cursor:pointer;font-size:12.5px;color:#444}
.mini:hover{border-color:#d2cec7}
.ask-box{display:flex;gap:7px;margin-top:8px}
.ask-box .ask-in{flex:1;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font:inherit;background:#fff}
.ask-box .ask-in:focus{outline:none;border-color:var(--accent2)}
.headlines{list-style:none;margin:6px 0 0;padding:0}
.headlines li{padding:6px 0;border-top:1px solid var(--line);font-size:13.7px}
.headlines li:first-child{border-top:none}
.headlines a{color:var(--ink);text-decoration:none}
.headlines a:hover{text-decoration:underline}
.aim-wrap{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px}
.aim-wrap .aim-h{font-weight:600;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.aim-wrap .aim-h .tag{background:#eef4fb;color:var(--accent);font-size:11px;padding:2px 7px;border-radius:6px}
.tool{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}
.tool h3{margin:0 0 8px;font-size:14.5px}
.tool textarea,.tool input[type=text]{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;background:#fff;resize:vertical}
.btn{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13.5px}
.btn:hover{opacity:.92}
.row{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
.timer-display{font-size:34px;font-weight:600;letter-spacing:1px;font-variant-numeric:tabular-nums}
.list{list-style:none;margin:10px 0 0;padding:0}

.list li:first-child{border-top:none}

.list .when{color:var(--muted);font-size:12px}
.out{margin-top:10px;background:#f6f8fb;border-radius:8px;padding:10px 12px;font-size:13.7px;white-space:pre-wrap}
.empty{color:var(--muted);font-size:13px;font-style:italic}
.src{color:var(--muted);font-size:12px;margin-top:5px}
.src b{font-weight:600;color:#5a6473}
.card-when{color:var(--muted);font-size:11.5px;margin:0 0 6px;display:flex;align-items:center;gap:4px}
.refresh-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.refresh-bar .when{color:var(--muted);font-size:12px}
.verified{display:inline-block;background:#e9f5ee;color:var(--good);font-size:11px;padding:1px 7px;border-radius:6px;margin-bottom:8px}
.foot{color:var(--muted);font-size:12px;text-align:center;margin-top:26px}
@media (max-width:560px){
  body{font-size:15.5px;padding-bottom:74px}
  .wrap{padding:14px 12px 28px}
  h1{font-size:18px}
  .titlerow{align-items:flex-start}
  .affirm{font-size:13.5px}
  nav.tabs{position:fixed;left:0;right:0;bottom:0;z-index:30;margin:0;gap:0;flex-wrap:nowrap;background:var(--card);border-top:1px solid var(--line);border-bottom:none;padding:5px 4px;padding-bottom:calc(5px + env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(0,0,0,.06)}
  .tab{flex:1;flex-direction:column;gap:2px;border-radius:10px;padding:6px 2px;font-size:10.5px}
  .tab .ico{font-size:19px}
  .tab .lbl{white-space:nowrap}
  .tab.active{background:transparent;color:var(--accent)}
  .card{padding:13px 13px}
  .card-actions{gap:6px}
  .mini{padding:7px 11px;font-size:13px}
  .ask-box .ask-in{font-size:16px}
  .btn{padding:9px 14px}
  .tool input[type=text],.tool textarea{font-size:16px}
  .timer-display{font-size:40px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="titlerow">
      <h1>☀️ Daily Dashboard</h1>
      <div class="title-right">
        <span class="date" id="dateLbl"></span>
        <button class="update-all" id="updateAll">↻ Update</button>
      </div>
    </div>
    <div class="update-status" id="updateStatus"></div>
    <div class="affirm">
      <b>✨ Today</b>
      <span class="a-text" id="affirm"></span>
      <button class="icon-btn" id="shuffleAff" title="New one">↻</button>
    </div>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <section class="panel" id="p-briefing"></section>
  <section class="panel" id="p-youtube"></section>
  <section class="panel" id="p-elon"></section>
  <section class="panel" id="p-mind"></section>
  <section class="panel" id="p-loa"></section>
  <section class="panel" id="p-tools">
    <div class="tool">
      <h3>🧠 ELI5 — explain anything simply</h3>
      <textarea id="eliIn" rows="3" placeholder="Paste a confusing sentence, term, or paragraph…"></textarea>
      <div class="row"><button class="btn" id="eliGo">Explain simply</button></div>
      <div class="out" id="eliOut" style="display:none"></div>
    </div>
    <div class="tool">
      <h3>⏱️ Focus timer</h3>
      <div class="timer-display" id="tDisp">25:00</div>
      <div class="row">
        <button class="btn" id="tStart">Start</button>
        <button class="mini" id="tPause">Pause</button>
        <button class="mini" id="tReset">Reset</button>
        <button class="mini" data-min="25">25</button>
        <button class="mini" data-min="15">15</button>
        <button class="mini" data-min="5">5</button>
      </div>
    </div>
    <div class="tool">
      <h3>🔖 Save for later</h3>
      <div class="row">
        <input type="text" id="saveIn" placeholder="Paste a link or note…" style="flex:1">
        <button class="btn" id="saveGo">Add</button>
      </div>
      <ul class="list" id="saveList"></ul>
    </div>
    <div class="tool">
      <h3>🌱 Gratitude / win log</h3>
      <div class="row">
        <input type="text" id="gratIn" placeholder="One good thing today…" style="flex:1">
        <button class="btn" id="gratGo">Log</button>
      </div>
      <ul class="list" id="gratList"></ul>
    </div>
  </section>

  <div class="foot" id="foot"></div>
</div>

function ytId(u){
  if(!u) return null;
  let m = u.match(/[?&]v=([A-Za-z0-9_-]{11})/) || u.match(/youtu\.be\/([A-Za-z0-9_-]{11})/) || u.match(/\/(?:embed|shorts)\/([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}
function ytThumb(id){ return "https://i.ytimg.com/vi/"+id+"/mqdefault.jpg"; }
// human "how long ago", recomputed every page load
function relAge(v){
  if(!v) return "";
  const d = new Date(v); if(isNaN(d.getTime())) return "";
  let s = Math.floor((Date.now() - d.getTime())/1000); if(s < 0) s = 0;
  if(s < 60) return "just now";
  if(s < 3600){ const n=Math.floor(s/60); return n+" min"+(n>1?"s":"")+" ago"; }
  if(s < 86400){ const n=Math.floor(s/3600); return n+" hour"+(n>1?"s":"")+" ago"; }
  const days = Math.floor(s/86400);
  if(days === 1) return "yesterday";
  if(days < 7) return days+" days ago";
  if(days < 30){ const n=Math.floor(days/7); return n+" week"+(n>1?"s":"")+" ago"; }
  return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
}
const ord = n => ["","first","second","third","fourth","fifth","sixth","seventh"][n] || (n+"th");

const REFRESH_TASK = "refresh-dashboard";
document.getElementById("updateAll").onclick = async function(){
  const btn = this, status = document.getElementById("updateStatus");
  if(!(window.cowork && window.cowork.runScheduledTask)){
    status.textContent = "Live update works inside the Claude app — open the dashboard there and press Update.";
    return;
  }
  btn.disabled = true; const orig = btn.textContent; btn.textContent = "Updating…";
  status.textContent = "Updating in the background — this can take a minute or two. Reload this view when it's done.";

function card(item, when){
  const div = document.createElement("div");
  div.className = "card";
  div.dataset.title = item.t;
  div.dataset.summary = item.s || "";
  div.dataset.level = "0";
  const titleHtml = item.url ? `<a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.t)}</a>` : esc(item.t);
  const ageStr = relAge(pubDate(item));
  const vid = ytId(item.url);
  const thumbHtml = vid ? `<a class="thumb-link" href="${esc(item.url)}" target="_blank" rel="noopener"><img class="thumb" loading="lazy" alt="" src="${esc(ytThumb(vid))}" onerror="this.closest('.thumb-link').style.display='none'"><span class="play"></span></a>` : "";
  div.innerHTML =
    thumbHtml +
    (item.tag ? `<span class="ts-tag">${esc(item.tag)}</span>` : "") +
    `<p class="t">${titleHtml}</p>` +
    (ageStr ? `<p class="card-when" title="published ${esc(pubDate(item))}">🕒 ${esc(ageStr)}</p>` : "") +
    (item.s ? `<p class="s">${esc(item.s)}</p>` : "") +
    ((item.points && item.points.length) ? `<details class="pts"><summary>${item.points.length} points discussed</summary>${item.points.map(pt=>`<div class="pt"><span class="pt-t">${esc(pt.t)}</span>${pt.s?`<span class="pt-s">${esc(pt.s)}</span>`:""}</div>`).join("")}</details>` : "") +
    (item.src ? `<p class="src"><b>Source:</b> ${esc(item.src)}</p>` : "") +
    (item.eli ? `<div class="eli"><b>ELI5:</b> ${esc(item.eli)}</div>` : "") +
    ((item.seen && item.seen.length) ? `<p class="ts-seen"><b>Also in:</b> ${item.seen.map(esc).join(" · ")}</p>` : "") +
    `<div class="more"></div>` +
    `<div class="card-actions">
       <button class="mini act-more">Tell me more ▸</button>
       <button class="mini act-ask">💬 Ask</button>
       <button class="mini act-save">🔖 Save</button>
     </div>` +
    `<div class="ask-box" style="display:none">
       <input type="text" class="ask-in" placeholder="Ask anything about this…">
       <button class="mini ask-go">Ask</button>
     </div>`;
  div.querySelector(".act-more").onclick = (e)=>tellMore(e.target);
  div.querySelector(".act-ask").onclick = (e)=>toggleAsk(e.target);
  const askGo = div.querySelector(".ask-go");
  const askIn = div.querySelector(".ask-in");
  askGo.onclick = ()=>askQuestion(div, askIn);
  askIn.addEventListener("keydown", e=>{ if(e.key==="Enter") askQuestion(div, askIn); });
  div.querySelector(".act-save").onclick = ()=>{ addSave((item.url?item.t+" — "+item.url:item.t)); flash(div.querySelector(".act-save"),"Saved ✓"); };
  return div;
}
function flash(btn,txt){ const o=btn.textContent; btn.textContent=txt; setTimeout(()=>btn.textContent=o,1200); }

async function tellMore(btn){
  const c = btn.closest(".card");
  if(!(window.cowork && window.cowork.askClaude)){
    window.open("https://www.google.com/search?q="+encodeURIComponent(c.dataset.title), "_blank", "noopener");
    return;
  }
  const level = parseInt(c.dataset.level||"0",10)+1;
  c.dataset.level = level;
  const box = c.querySelector(".more");
  const p = document.createElement("p");
  p.className = "exp loading";
  p.textContent = "thinking…";
  box.appendChild(p);
  const prompt =
    `You are expanding a single news item inside a personal daily dashboard.\n`+
    `Item title: "${c.dataset.title}".\n`+
    `Summary already shown: "${c.dataset.summary}".\n`+
    `The reader clicked "tell me more" for the ${ord(level)} time. Give ONE concise paragraph (2-4 sentences) adding the NEXT layer of detail — the most important context first (early clicks), finer / more technical detail at higher click levels. Be factual and neutral; if exact specifics are uncertain, give widely-known background. Do not repeat the summary verbatim.`;
  try{
    if(!(window.cowork && window.cowork.askClaude)) throw new Error("no askClaude");
    const res = await window.cowork.askClaude(prompt, []);
    const text = typeof res === "string" ? res : (res && (res.text || res.content || res.output)) || JSON.stringify(res);
    p.classList.remove("loading");
    p.textContent = text.trim();
  }catch(e){
    p.classList.remove("loading");
    p.textContent = "More detail isn't available right now — open the source link for the full story.";
  }
}

function toggleAsk(btn){
  const c = btn.closest(".card");

  box.style.display = open ? "flex" : "none";

}

async function askQuestion(c, input){
  const q = (input.value||"").trim();
  if(!q) return;
  if(!(window.cowork && window.cowork.askClaude)){
    window.open("https://www.google.com/search?q="+encodeURIComponent(c.dataset.title+" — "+q), "_blank", "noopener");
    return;
  }
  input.value = "";
  const box = c.querySelector(".more");
  const p = document.createElement("p");
  p.className = "exp qa loading";
  p.innerHTML = `<span class="q">${esc(q)}</span>thinking…`;
  box.appendChild(p);
  const prompt =
    `You are answering a reader's question about a single news item in their personal daily dashboard.\n`+
    `Item title: "${c.dataset.title}".\n`+
    `Summary shown to them: "${c.dataset.summary}".\n`+
    `Their question: "${q}".\n`+
    `Answer concisely (1-3 sentences), factually and neutrally. If the answer isn't certain from this item, give the widely-known relevant background and say so briefly.`;
  try{
    const res = await window.cowork.askClaude(prompt, []);
    const text = typeof res === "string" ? res : (res && (res.text || res.content || res.output)) || JSON.stringify(res);
    p.classList.remove("loading");
    p.innerHTML = `<span class="q">${esc(q)}</span>${esc(text.trim())}`;
  }catch(e){
    p.classList.remove("loading");
    p.innerHTML = `<span class="q">${esc(q)}</span>Couldn't answer right now — try opening the source link.`;
  }
}

/*FRESH_GUARD_START*/
/* Enforces two rules on every render/update:
   1) Never display any news/breakthrough item more than 24h old.
   2) If an item already appeared earlier today, hide it after a fresh update
      (same-day dedup, keyed by DATA.updated). Resets each new day. */
(function enforceFreshness(){
  var DAY_MS = 24*60*60*1000;
  var PLACE = /nothing new|no news|no relevant|no notable|no new video|no major new|no items|not available|no entries/i;
  function isPlace(it){ return !!it && PLACE.test(String((it&&(it.t||it.author))||"")); }
  function fresh(it){
    if(isPlace(it)) return true;
    var d = pubDate(it);
    if(!d) return false;
    var t = new Date(d).getTime();
    if(isNaN(t)) return false;
    return (Date.now() - t) <= DAY_MS;
  }
  var now = new Date();
  var tk = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0");
  var led=null; try{ led = JSON.parse(localStorage.getItem("dash_seen")||"null"); }catch(e){}
  if(!led || led.date!==tk) led = {date:tk, sig:"", keys:{}};
  var sig = String(DATA.updated||"");
  var isNew = led.sig !== sig;            // a genuinely new update happened today
  function keyOf(it){ return ((it&&it.url)||"") + "|" + ((it&&it.t)||""); }
  var shown = {};
  function keep(it){
    if(!fresh(it)) return false;          // rule 1: drop >24h
    if(isPlace(it)) return true;          // keep placeholders
    var k = keyOf(it);
    if(isNew && Object.prototype.hasOwnProperty.call(led.keys,k)) return false; // rule 2: shown earlier today
    shown[k]=1; return true;
  }
  function filt(a){ return Array.isArray(a) ? a.filter(keep) : a; }

  if(DATA.topstories) DATA.topstories.items = filt(DATA.topstories.items);
  if(DATA.news){ ["world","techai","business","india"].forEach(function(k){ if(DATA.news[k]) DATA.news[k]=filt(DATA.news[k]); }); }
  if(Array.isArray(DATA.briefing)) DATA.briefing.forEach(function(s){ if(s) s.items=filt(s.items); });
  DATA.elonNews = filt(DATA.elonNews);
  if(DATA.mind && Array.isArray(DATA.mind.groups)) DATA.mind.groups.forEach(function(g){ if(g) g.items=filt(g.items); });

  if(DATA.youtube && Array.isArray(DATA.youtube.groups)){
    var groups=[];
    DATA.youtube.groups.forEach(function(g){
      if(!g) return;
      if(g.type==="aim"){
        g.keys = filt(g.keys||[]);
        if(g.headlines) g.headlines = g.headlines.filter(function(h){ var k=keyOf(h); if(isNew && Object.prototype.hasOwnProperty.call(led.keys,k)) return false; shown[k]=1; return true; });
        g.count = g.keys.length;
        if(g.keys.length || (g.headlines && g.headlines.length)) groups.push(g);
      } else {
        g.items = filt(g.items||[]);
        if(g.items.length) groups.push(g);
      }
    });
    DATA.youtube.groups = groups;
    DATA.youtube.count = groups.reduce(function(n,g){ return n + ((g.items&&g.items.length)||(g.keys&&g.keys.length)||0); },0);
    if(!groups.length){
      DATA.youtube.groups = [{h:"YouTube", items:[{t:"Nothing new in the last 24h", s:"No relevant uploads in the last 24 hours.", url:"", published:""}]}];
      DATA.youtube.count = 0;
    }
  }

  /* NOTE: DATA.mindset is intentionally NOT filtered or de-duped here.
     Each teacher's latest video gist must persist and stay re-readable until a
     genuinely newer video replaces it - even if that video is more than 24h old. */

  Object.keys(shown).forEach(function(k){ led.keys[k]=1; });
  led.sig = sig; led.date = tk;
  try{ localStorage.setItem("dash_seen", JSON.stringify(led)); }catch(e){}
})();
