<!doctype html><!--
  TEMPLATE for Rohit's Daily Dashboard  ·  "STUDIO" edition (NuPhy Kick75 product-page look
  + Glass light/dark). Three themes total — the pixel-keycap "Kick75" theme was removed 2026-07-11.
  The Cowork daily task ONLY replaces the three marked regions each morning:
    /*DATA_START*/ ... /*DATA_END*/       (the JSON data)
    /*THUMBS_START*/ ... /*THUMBS_END*/   (inline video thumbnails)
    /*SOM_START*/ ... /*SOM_END*/         (Star of Mysore page images)
  Everything else (tabs, CSS, render functions, freshness guard) is the template - edit freely,
  but KEEP those six markers intact and do NOT remove the Science Daily tab or re-add Audio/Tools tabs.
  The placeholders here are just sample data so the page renders in a browser while you edit.

  STUDIO EDITION notes (data contract and localStorage keys are unchanged):
  - THREE explicit theme buttons in the ⋯ menu (✨ Studio / ☀ Glass / 🌙 Dark) — no cycling toggle.
    Stored in dash_theme; DEFAULT is "studio" (any old stored "retro" value falls back to studio).
    The "t" key still cycles all three.
  - STUDIO theme = the NuPhy Kick75 product-page look: real sampled colours (#ededed grey,
    #e7c353 mustard, #cf3327 red, #68b3f8 sky, RGB gradient #5796d0→#af5092→#d54c8e→#de7954)
    and two real keyboard-free WebP crops (cloud band drifting on the masthead top, RGB waveform
    washing the hero); white cards + product shadows + black Archivo headlines + black CTA pills;
    glossy floating objects (#blob1-3 restyled); animated RGB accents (active-tab underglow, hero
    rail + sheen, bottom-edge glow via #skyGround). Retro is kept to two popping accents only:
    the cloud band and the pixel "all caught up" sign-off (Press Start 2P stays loaded for it).
  - The masthead TITLE was removed on purpose (no "Daily Dashboard" heading) — do not re-add it.
    The masthead is: Mysuru chip + date pill, grade pills, and the signal ring.
  - Renders the optional per-item fields when present: assess{mag,timeline,evidence,verdict,basis},
    kind, facts[], stage, stageDay, forYou (news), subject (youtube). Older data renders fine without them.
  - Save button and Mark-read buttons are intentionally ABSENT (per Rohit). Opening a story still
    silently marks it read (dash_read) and powers unread badges. "In brief" box exists on News ONLY.
  - If you redesign again, update the daily task's STRUCTURE LOCK section in the SAME edit.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Daily Dashboard</title>
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet">
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#eef1f8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20512%20512'%3E%3Cdefs%3E%3ClinearGradient%20id='g'%20x1='0'%20y1='0'%20x2='1'%20y2='1'%3E%3Cstop%20offset='0'%20stop-color='%232563eb'/%3E%3Cstop%20offset='1'%20stop-color='%235b46e5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20width='512'%20height='512'%20rx='110'%20fill='%23080b13'/%3E%3Ccircle%20cx='256'%20cy='230'%20r='120'%20fill='none'%20stroke='url(%23g)'%20stroke-width='34'/%3E%3Crect%20x='140'%20y='388'%20width='232'%20height='30'%20rx='15'%20fill='url(%23g)'/%3E%3C/svg%3E">
<style>
*{box-sizing:border-box}
html{font-size:16px}
html,body{margin:0}
body{font:400 .95rem/1.55 -apple-system,BlinkMacSystemFont,system-ui,"Segoe UI",Roboto,"Hind Mysuru",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;position:relative;overflow-x:clip}
:root{color-scheme:light;--shadowc:rgba(30,40,90,.14);
  --bg:#eef1f8;--ink:#12151f;--ink2:#3c4155;--mut:#868da2;
  --glassA:rgba(255,255,255,.66);--glassB:rgba(255,255,255,.45);
  --topline:rgba(255,255,255,.85);--edge:rgba(255,255,255,.55);--edge2:rgba(30,40,90,.06);
  --grid:rgba(60,90,200,.10);
  --shadow:0 14px 34px rgba(30,40,90,.12),0 2px 8px rgba(30,40,90,.06);
  --crit:#ef4444;--impt:#f59e0b;--gold:#f2b705;--good:#22c55e}
:root[data-theme="dark"]{color-scheme:dark;
  --bg:#080b13;--ink:#eef0f8;--ink2:#c2c7d8;--mut:#7d8399;
  --glassA:rgba(24,29,46,.62);--glassB:rgba(24,29,46,.44);
  --topline:rgba(255,255,255,.2);--edge:rgba(255,255,255,.13);--edge2:rgba(255,255,255,.05);
  --grid:rgba(120,150,255,.10);
  --shadow:0 16px 40px rgba(0,0,0,.5),0 2px 10px rgba(0,0,0,.32)}
@media (prefers-color-scheme:dark){:root:not([data-theme="light"]):not([data-theme="studio"]){color-scheme:dark;
  --bg:#080b13;--ink:#eef0f8;--ink2:#c2c7d8;--mut:#7d8399;
  --glassA:rgba(24,29,46,.62);--glassB:rgba(24,29,46,.44);
  --topline:rgba(255,255,255,.2);--edge:rgba(255,255,255,.13);--edge2:rgba(255,255,255,.05);
  --grid:rgba(120,150,255,.10);
  --shadow:0 16px 40px rgba(0,0,0,.5),0 2px 10px rgba(0,0,0,.32)}}
/* ===== per-tab themes (accent, hero gradient, glow trio) ===== */
body[data-tt="news"]{--ac:#2563eb;--ac2:#7c8cff;--hA:#2563eb;--hB:#5b46e5;--g1:rgba(37,99,235,.55);--g2:rgba(124,58,237,.38);--g3:rgba(56,189,248,.36)}
body[data-tt="aitrends"]{--ac:#06b6d4;--ac2:#a78bfa;--hA:#0891b2;--hB:#7c3aed;--g1:rgba(6,182,212,.55);--g2:rgba(139,92,246,.42);--g3:rgba(236,72,153,.3)}
body[data-tt="science"]{--ac:#0d9488;--ac2:#34d399;--hA:#0d9488;--hB:#059669;--g1:rgba(13,148,136,.55);--g2:rgba(52,211,153,.38);--g3:rgba(34,211,238,.32)}
body[data-tt="scidaily"]{--ac:#7c3aed;--ac2:#c084fc;--hA:#7c3aed;--hB:#c026d3;--g1:rgba(124,58,237,.55);--g2:rgba(192,38,211,.38);--g3:rgba(99,102,241,.32)}
body[data-tt="youtube"]{--ac:#e11d48;--ac2:#fb7185;--hA:#e11d48;--hB:#d946ef;--g1:rgba(225,29,72,.5);--g2:rgba(217,70,239,.36);--g3:rgba(251,146,60,.28)}
body[data-tt="elon"]{--ac:#9aa7c7;--ac2:#e2e8f0;--hA:#1e293b;--hB:#475569;--g1:rgba(148,163,184,.38);--g2:rgba(100,116,139,.32);--g3:rgba(226,232,240,.16)}
body[data-tt="mind"]{--ac:#c026d3;--ac2:#e879f9;--hA:#c026d3;--hB:#7c3aed;--g1:rgba(192,38,211,.5);--g2:rgba(124,58,237,.38);--g3:rgba(244,114,182,.32)}
body[data-tt="loa"]{--ac:#f59e0b;--ac2:#fbbf24;--hA:#f59e0b;--hB:#ea580c;--g1:rgba(245,158,11,.5);--g2:rgba(234,88,12,.36);--g3:rgba(251,113,133,.26)}
body[data-tt="som"]{--ac:#b45309;--ac2:#d6a354;--hA:#92400e;--hB:#b45309;--g1:rgba(180,83,9,.46);--g2:rgba(214,163,84,.36);--g3:rgba(120,53,15,.3)}
/* ===== aurora + grid ===== */
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle,var(--grid) 1px,transparent 1.4px);background-size:26px 26px;
  -webkit-mask:linear-gradient(#000 45%,transparent 90%);mask:linear-gradient(#000 45%,transparent 90%)}
.blob{position:fixed;border-radius:50%;filter:blur(78px);pointer-events:none;z-index:0;animation:drift 14s ease-in-out infinite;transition:background .5s ease}
@keyframes drift{50%{transform:translate(16px,12px) scale(1.06)}}
#blob1{width:420px;height:420px;top:-150px;right:-100px;background:radial-gradient(circle,var(--g1),transparent 70%)}
#blob2{width:340px;height:320px;top:70px;left:-140px;background:radial-gradient(circle,var(--g2),transparent 70%);animation-delay:-4s}
#blob3{width:280px;height:280px;top:460px;right:-80px;background:radial-gradient(circle,var(--g3),transparent 72%);animation-delay:-8s}
#skyGround{display:none}
/* ===== layout ===== */
.wrap{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:16px 18px 64px}
a{color:inherit}
:where(a,button,input,summary):focus-visible{outline:2px solid var(--ac);outline-offset:2px;border-radius:6px}
button{font-family:inherit}
::selection{background:var(--ac);color:#fff}
/* ===== glass panels ===== */
.glass,.gcard{position:relative;border:1px solid transparent;border-radius:24px;box-shadow:var(--shadow),inset 0 1px 0 var(--topline)}
.glass{background:linear-gradient(var(--glassA),var(--glassA)) padding-box,linear-gradient(165deg,var(--edge) 0%,var(--edge2) 45%,color-mix(in srgb,var(--ac) 35%,transparent) 100%) border-box;backdrop-filter:blur(22px) saturate(1.6);-webkit-backdrop-filter:blur(22px) saturate(1.6)}
.gcard{background:linear-gradient(var(--glassB),var(--glassB)) padding-box,linear-gradient(165deg,var(--edge) 0%,var(--edge2) 50%,color-mix(in srgb,var(--ac) 26%,transparent) 100%) border-box}
@supports not ((backdrop-filter:blur(2px)) or (-webkit-backdrop-filter:blur(2px))){.glass{background:var(--glassA)}}
/* ===== pills ===== */
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:.68rem;font-weight:800;letter-spacing:.02em;
  background:color-mix(in srgb,var(--pc,#868da2) 15%,transparent);color:var(--pc,#868da2);
  border:1px solid color-mix(in srgb,var(--pc,#868da2) 34%,transparent);
  box-shadow:0 0 16px color-mix(in srgb,var(--pc,#868da2) 24%,transparent),inset 0 1px 0 rgba(255,255,255,.16);white-space:nowrap}
button.pill{cursor:pointer;font-size:.68rem;font-weight:800}
button.pill:active{transform:scale(.96)}
@keyframes pulse{50%{box-shadow:0 0 28px color-mix(in srgb,var(--pc) 58%,transparent)}}
.pill.live{animation:pulse 1.7s ease-in-out infinite}
/* ===== slim per-tab header + FAB options ===== */
.slim-head{display:none;padding:6px 6px 2px;margin-bottom:10px}
body:not([data-tt="news"]) #mastFull{display:none}
body:not([data-tt="news"]) .slim-head{display:block}
.slim-title{display:flex;align-items:baseline;gap:11px;flex-wrap:wrap}
#slimName{font-size:1.85rem;font-weight:850;letter-spacing:-.03em;background:linear-gradient(120deg,var(--ac),var(--ac2));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1.1}
.slim-count{font-size:.82rem;font-weight:800;letter-spacing:.02em;color:var(--mut)}
.fab-menu{position:fixed;top:14px;right:14px;z-index:55;width:40px;height:40px;border:none;border-radius:14px;cursor:pointer;font-size:1.3rem;line-height:1;color:#fff;background:linear-gradient(120deg,var(--ac),var(--ac2));box-shadow:0 5px 16px color-mix(in srgb,var(--ac) 45%,transparent),inset 0 1px 0 rgba(255,255,255,.35)}
.fab-menu:active{transform:scale(.94)}
.fab-sheet{position:fixed;top:60px;right:14px;z-index:56;display:none;flex-direction:column;gap:3px;padding:8px;min-width:200px;border-radius:20px}
.fab-sheet.open{display:flex}
.fab-item{display:flex;align-items:center;gap:8px;border:none;background:none;color:var(--ink);font:700 .82rem/1 inherit;padding:11px 12px;border-radius:12px;cursor:pointer;text-align:left}
.fab-item:hover{background:color-mix(in srgb,var(--ac) 12%,transparent)}
.fab-row{display:flex;align-items:center;gap:7px;padding:8px 12px;border-top:1px solid var(--edge2);margin-top:3px}
.fab-lbl{flex:1;font-size:.72rem;font-weight:700;color:var(--mut)}
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:2px 4px 6px}
.theme-opt{display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 4px 8px;border-radius:12px;cursor:pointer;border:1px solid var(--edge2);background:color-mix(in srgb,var(--mut) 8%,transparent);color:var(--ink2);font:800 .58rem/1 inherit;letter-spacing:.03em;transition:transform .08s ease,box-shadow .08s ease}
.theme-opt .em{font-size:1.05rem;line-height:1}
.theme-opt:active{transform:translateY(1px)}
.theme-opt.on{background:linear-gradient(120deg,var(--ac),var(--ac2));color:#fff;border-color:transparent;box-shadow:0 4px 12px color-mix(in srgb,var(--ac) 40%,transparent),inset 0 1px 0 rgba(255,255,255,.35)}
/* ===== masthead ===== */
.mast{padding:16px 18px;margin-bottom:12px;display:flex;gap:15px;align-items:center;flex-wrap:wrap;position:sticky;top:8px;z-index:20;transform-origin:top center;transition:opacity .32s ease,transform .32s ease,filter .32s ease,margin .32s ease}
.mast.mast-hide{opacity:0;transform:translateY(-22px) scale(.965);filter:blur(6px);pointer-events:none;margin-bottom:-88px}
.ring{position:relative;flex:0 0 92px;width:92px;height:92px;filter:drop-shadow(0 0 14px color-mix(in srgb,var(--ac) 42%,transparent))}
.ring svg{transform:rotate(-90deg);display:block}
.ring .rc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .rn{font-size:1.65rem;font-weight:850;letter-spacing:-.04em;line-height:1;background:linear-gradient(120deg,var(--ac),var(--ac2));-webkit-background-clip:text;background-clip:text;color:transparent}
.ring .rl{font-size:.54rem;font-weight:800;letter-spacing:.14em;color:var(--mut)}
.m-right{flex:1;min-width:210px}
.m-date{font-size:.68rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--mut);display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:0 0 9px}
.m-sub{display:flex;gap:6px;flex-wrap:wrap}
.m-tools{display:flex;gap:6px;align-items:center;margin-left:auto}
.tool{border:1px solid var(--edge2);background:color-mix(in srgb,var(--mut) 8%,transparent);color:var(--mut);border-radius:12px;padding:5px 9px;cursor:pointer;font-size:.74rem;font-weight:700;line-height:1}
.tool:hover{color:var(--ink)}
.update-all{border:none;border-radius:12px;padding:6px 13px;cursor:pointer;font-size:.74rem;font-weight:800;color:#fff;background:linear-gradient(120deg,var(--ac),var(--ac2));box-shadow:0 4px 14px color-mix(in srgb,var(--ac) 45%,transparent),inset 0 1px 0 rgba(255,255,255,.35)}
.update-all:disabled{opacity:.55;cursor:default}
.update-status{color:var(--mut);font-size:.74rem;margin:2px 4px 8px}
.update-status:empty{display:none}
/* ===== tabs ===== */
nav.tabs{position:sticky;top:10px;z-index:30;display:flex;gap:4px;padding:5px;margin:0 0 14px;border-radius:999px}
.tab{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:5px;border:none;background:none;padding:8px 4px;border-radius:999px;font-size:.64rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--mut);cursor:pointer;position:relative;white-space:nowrap}
.tab .ico{display:none;font-size:1.05rem;line-height:1}
.tab.active{background:linear-gradient(120deg,var(--ac),var(--ac2));color:#fff;box-shadow:0 5px 18px color-mix(in srgb,var(--ac) 48%,transparent),inset 0 1px 0 rgba(255,255,255,.35)}
.tab .ub{position:absolute;top:-2px;right:2px;background:var(--crit);color:#fff;font-size:.56rem;font-weight:800;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.tab .ub:empty{display:none}
.more-menu{position:fixed;z-index:1000;padding:8px;display:none;flex-direction:column;gap:3px;min-width:180px;border-radius:20px}
.more-menu.open{display:flex}
.more-menu .tab{flex-direction:row;justify-content:flex-start;gap:9px;padding:11px 13px;font-size:.72rem;letter-spacing:.06em}
.more-menu .tab .ico{display:inline}
/* ===== sections / heroes / cards ===== */
.sec{font-size:.64rem;font-weight:850;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin:18px 6px 10px;display:flex;align-items:center;gap:8px}
/* ===== animated panel headings, section breakers & stickers (added 2026-07-11) ===== */
.phead{display:flex;align-items:center;gap:12px;margin:4px 4px 14px;flex-wrap:wrap}
.ph-badge{font-size:2rem;line-height:1;display:inline-block;transform-origin:50% 80%;animation:ph-pop .55s cubic-bezier(.34,1.56,.64,1) both,bob 3.2s ease-in-out 1s infinite}
.ph-ttl{font-size:1.95rem;font-weight:900;letter-spacing:-.02em;margin:0;line-height:1;background:linear-gradient(100deg,var(--ac),var(--ac2,#8b5cf6));-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent}
.ph-badge,.sp,.brk-emo,.sec-emo{will-change:transform}
.sp{display:inline-block;font-size:1.35rem;line-height:1}
.sp.spin{animation:spin 4.5s linear infinite}
.sp.float{animation:floaty 3s ease-in-out infinite}
.brk{display:flex;align-items:center;gap:14px;margin:24px 6px 4px}
.brk-line{flex:1;height:2px;border-radius:2px;background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--ac) 45%,transparent),transparent)}
.brk-emo{font-size:1.75rem;line-height:1;display:inline-block;filter:drop-shadow(0 4px 7px rgba(0,0,0,.22))}
.brk-emo.bob{animation:bob 2.4s ease-in-out infinite}
.brk-emo.beat{animation:beat 1.6s ease-in-out infinite}
.brk-emo.spin{animation:spin 6s linear infinite}
.sec-emo{font-size:1.05rem;display:inline-block;animation:bob 3s ease-in-out infinite}
@keyframes ph-pop{0%{opacity:0;transform:scale(.4) rotate(-16deg)}100%{opacity:1;transform:none}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes beat{0%,100%{transform:scale(1)}14%{transform:scale(1.22)}28%{transform:scale(1)}42%{transform:scale(1.14)}}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-5px) rotate(9deg)}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){.ph-badge,.sp,.brk-emo,.sec-emo{animation:none}}
.panel{display:none;animation:fade .22s ease}
.panel.active{display:block}
.reveal,.reveal.in{opacity:1!important;transform:none!important;transition:none!important}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.empty{color:var(--mut);font-size:.84rem;font-style:italic;margin:6px}
.hero{border-radius:24px;padding:16px 18px;margin-bottom:12px;position:relative;overflow:hidden;
  background:linear-gradient(160deg,color-mix(in srgb,var(--hA) 20%,var(--glassA)),color-mix(in srgb,var(--hB) 12%,var(--glassA))) padding-box,
    linear-gradient(165deg,var(--edge),color-mix(in srgb,var(--hA) 42%,transparent)) border-box;
  border:1px solid transparent;backdrop-filter:blur(22px) saturate(1.5);-webkit-backdrop-filter:blur(22px) saturate(1.5);
  box-shadow:0 16px 40px color-mix(in srgb,var(--hA) 20%,var(--shadowc,rgba(0,0,0,.28))),inset 0 1px 0 var(--topline)}
.hero::after{content:"";position:absolute;width:220px;height:220px;border-radius:50%;top:-110px;right:-64px;background:radial-gradient(circle,color-mix(in srgb,var(--hA) 26%,transparent),transparent 70%);pointer-events:none}
.hero .pill{background:color-mix(in srgb,var(--ac) 15%,transparent);color:var(--ac2);border-color:color-mix(in srgb,var(--ac) 34%,transparent)}
.hero .st-t,.hero .st-t a{color:var(--ink)}
.hero .st-s{color:var(--ink)}
.hero .why{margin-top:9px;padding:8px 12px;border-radius:13px;font-size:.78rem;font-weight:600;color:var(--ink2);background:color-mix(in srgb,var(--ac) 10%,transparent);border:1px solid color-mix(in srgb,var(--ac) 26%,transparent)}
.hero .meta{color:var(--mut)}
.hero .heat{background:color-mix(in srgb,var(--mut) 16%,transparent)}
.hero .heat i{background:linear-gradient(90deg,var(--ac),var(--ac2))}
.hero .trank{opacity:1}
.story{padding:14px 16px;margin-bottom:11px;display:flex;gap:12px}
.tile{flex:0 0 42px;width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.08rem;
  background:linear-gradient(135deg,color-mix(in srgb,var(--kc,var(--ac)) 30%,transparent),color-mix(in srgb,var(--kc,var(--ac)) 9%,transparent));
  border:1px solid color-mix(in srgb,var(--kc,var(--ac)) 40%,transparent);
  box-shadow:0 5px 16px color-mix(in srgb,var(--kc,var(--ac)) 26%,transparent),inset 0 1px 0 rgba(255,255,255,.3)}
.sbody{flex:1;min-width:0}
.chiprow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.st-t{font-size:.98rem;font-weight:800;letter-spacing:-.01em;margin:0 0 3px;line-height:1.4}
.st-t a{text-decoration:none}
.st-t a:hover{text-decoration:underline;text-decoration-color:var(--ac);text-underline-offset:3px}
.st-s{color:var(--ink);font-size:.85rem;margin:0}
.meta{margin-top:7px;font-size:.67rem;color:var(--mut);font-weight:700}

/* ================= "STUDIO" THEME (4th) =================
   The NuPhy Kick75 product-page look, copied as closely as possible with REAL sampled colours
   and REAL (keyboard-free) picture crops from the Kick75 artwork, inlined as WebP:
   - #ededed studio grey (page bg), #e7c353 switch-card mustard, #cf3327 switch red, #68b3f8 sky
   - RGB gradient #5796d0 → #af5092 → #d54c8e → #de7954 sampled off the "1000Hz" numerals
   - real cloud-band crop drifting across the masthead top; real RGB-waveform crop washing the hero
   Clean modern: white cards, product-photo shadows, bold Archivo black headlines, glossy floating
   objects, animated RGB accents. Retro kept to two popping accents: the cloud band + the pixel
   "all caught up" sign-off. */
:root[data-theme="studio"]{color-scheme:light;
  --bg:#ededed;--ink:#141412;--ink2:#3f3f3c;--mut:#8a8a86;
  --glassA:#ffffff;--glassB:#ffffff;
  --topline:rgba(255,255,255,0);--edge:rgba(20,20,18,.05);--edge2:rgba(20,20,18,.08);
  --grid:transparent;
  --shadow:0 1px 2px rgba(20,20,18,.05),0 22px 44px -14px rgba(20,20,18,.16);
  --crit:#cf3327;--impt:#e7a53a;--gold:#e7c353;--good:#2f9e5b;
  --rgbA:#5796d0;--rgbB:#af5092;--rgbC:#d54c8e;--rgbD:#de7954}
:root[data-theme="studio"] body{background:radial-gradient(1200px 620px at 50% -12%,#f8f8f7,transparent 62%),radial-gradient(900px 520px at 88% 108%,#e3e3e1,transparent 56%),var(--bg)}
:root[data-theme="studio"] body::before{background-image:none;-webkit-mask:none;mask:none}
/* glossy floating studio objects (real product shading, soft float) */
:root[data-theme="studio"] .blob{filter:none;opacity:1;animation:sfloat 9s ease-in-out infinite}
:root[data-theme="studio"] #blob1{width:86px;height:86px;top:150px;right:5%;
  background:radial-gradient(circle at 32% 26%,#ffb9ab 0%,#df4a3a 40%,#a01a10 76%,#7c0f07 100%);
  box-shadow:inset 0 3px 6px rgba(255,255,255,.55),inset 0 -10px 16px rgba(90,8,4,.55),0 30px 28px -16px rgba(120,20,12,.4)}
:root[data-theme="studio"] #blob1::after{content:"";position:absolute;left:16%;top:12%;width:26px;height:15px;border-radius:50%;background:radial-gradient(closest-side,rgba(255,255,255,.95),transparent);transform:rotate(-24deg)}
:root[data-theme="studio"] #blob2{width:62px;height:62px;top:auto;bottom:130px;left:4%;border-radius:20px;animation-delay:-3.2s;
  background:linear-gradient(155deg,#f4d97a,#e7c353 45%,#c69d2c);

:root[data-theme="studio"] .slim-count{color:#8a8a86}
:root[data-theme="studio"] .sec{font-family:"Archivo",inherit;font-size:.76rem;font-weight:800;letter-spacing:.14em;color:#141412}

:root[data-theme="studio"] .since .sh,:root[data-theme="studio"] .legend>summary{background:none;-webkit-background-clip:initial;background-clip:initial;-webkit-text-fill-color:#141412;color:#141412;font-family:"Archivo",inherit;font-weight:900}
:root[data-theme="studio"] .q::before,:root[data-theme="studio"] .q .auth{background:none;-webkit-background-clip:initial;background-clip:initial;-webkit-text-fill-color:#141412;color:#141412}

/* the "In brief" glance = the mustard switch-card block */

:root[data-theme="studio"] .tab.active{background:linear-gradient(#2b2b28,#141412);color:#fff;box-shadow:0 8px 16px -6px rgba(20,20,18,.45),inset 0 1px 0 rgba(255,255,255,.12)}

:root[data-theme="studio"] .hero{color:#141412;border:1px solid rgba(20,20,18,.06);

:root[data-theme="studio"] .hero .why{background:#f6f6f4;border:1px solid rgba(20,20,18,.07);color:#3f3f3c}
:root[data-theme="studio"] .hero .pill{background:color-mix(in srgb,var(--ac) 12%,#fff);color:var(--ac);border-color:color-mix(in srgb,var(--ac) 30%,transparent)}
/* heat meters: the 1000Hz waveform — thin RGB bars */
:root[data-theme="studio"] .heat{height:14px;border-radius:4px;background:#efefed;box-shadow:inset 0 1px 2px rgba(20,20,18,.08)}
:root[data-theme="studio"] .heat i{border-radius:4px;background:linear-gradient(90deg,var(--rgbA),var(--rgbB) 42%,var(--rgbC) 66%,var(--rgbD));box-shadow:none;
  -webkit-mask:repeating-linear-gradient(90deg,#000 0 4px,transparent 4px 7px);mask:repeating-linear-gradient(90deg,#000 0 4px,transparent 4px 7px)}
:root[data-theme="studio"] .heat i::after{display:none}
:root[data-theme="studio"] .hero .heat{background:#efefed}
:root[data-theme="studio"] .hero .heat i{background:linear-gradient(90deg,var(--rgbA),var(--rgbB) 42%,var(--rgbC) 66%,var(--rgbD))}
/* tiles, badges, extras */
:root[data-theme="studio"] .tile{background:color-mix(in srgb,var(--kc,var(--ac)) 13%,#fff);border:1px solid color-mix(in srgb,var(--kc,var(--ac)) 28%,transparent);box-shadow:0 10px 18px -10px color-mix(in srgb,var(--kc,var(--ac)) 55%,transparent)}
:root[data-theme="studio"] .sub{border:2px solid #fff;box-shadow:0 6px 14px -6px color-mix(in srgb,var(--sc,#334155) 60%,transparent)}
:root[data-theme="studio"] .thumb{border:1px solid rgba(20,20,18,.08);box-shadow:0 12px 24px -12px rgba(20,20,18,.3)}
:root[data-theme="studio"] .fy{background:color-mix(in srgb,#e7c353 24%,#fff);border:1px solid rgba(150,110,20,.35);box-shadow:none;color:#3a2c00}
:root[data-theme="studio"] .verdict{box-shadow:none}
:root[data-theme="studio"] .cat>summary .cn.unread{background:#141412;color:#fff;border:none}
:root[data-theme="studio"] .allcaught{font-family:"Press Start 2P",ui-monospace,monospace;font-size:.52rem;opacity:1;
  background:linear-gradient(90deg,var(--rgbA),var(--rgbC),var(--rgbD));-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;
  animation:pxblink 1.6s steps(2,jump-none) infinite}
:root[data-theme="studio"] .allcaught::before{content:"▶ "}
:root[data-theme="studio"] .allcaught::after{content:" ◀"}
:root[data-theme="studio"] .toast{background:linear-gradient(#2b2b28,#141412);color:#fff;box-shadow:0 12px 28px -10px rgba(20,20,18,.6)}
:root[data-theme="studio"] ::selection{background:#141412;color:#fff}
/* ===== Follow button + Following tab (added 2026-07-11) ===== */
.act-follow.on{background:linear-gradient(120deg,var(--ac),var(--ac2));color:#fff;border-color:transparent}
.fol{padding:15px 17px;margin-bottom:12px}
.fol-head{display:flex;align-items:flex-start;gap:12px;justify-content:space-between}
.fol-title{font-weight:850;font-size:1.05rem;color:var(--ink);line-height:1.3}
.fol-x{flex:0 0 auto;font-size:.58rem!important;letter-spacing:.04em;opacity:.8}
.fol-x:hover{opacity:1;color:#ef4444}
.fol-latest{margin-top:8px;font-size:.92rem;color:var(--ink2);font-weight:650;line-height:1.5}
.fol-latest::before{content:"● LATEST  ";font-size:.55rem;font-weight:850;letter-spacing:.12em;color:#22c55e;vertical-align:middle}
.fol-hist{margin-top:11px;border-top:1px solid var(--edge2);padding-top:9px}
.fol-hist>summary{cursor:pointer;list-style:none;font-size:.64rem;font-weight:850;letter-spacing:.11em;text-transform:uppercase;color:var(--mut)}
.fol-hist>summary::-webkit-details-marker{display:none}
.fol-hist>summary::after{content:" ▾";color:var(--mut)}
.fol-hist[open]>summary::after{content:" ▴"}
.fol-list{margin-top:10px;display:flex;flex-direction:column;gap:9px}
.fol-row{display:flex;gap:11px;font-size:.82rem}
.fol-d{flex:0 0 60px;color:var(--mut);font-weight:800;font-size:.66rem;padding-top:2px;white-space:nowrap}
.fol-t{color:var(--ink2);line-height:1.45}
/* ===== Per-tab "Fit to screen" slider + condensed density ===== */
.fitbar{display:flex;align-items:center;gap:12px;margin:2px 2px 14px;padding:11px 16px;column-span:all;-webkit-column-span:all}
.fb-ic{font-size:1.15rem}
.fb-lbl{font-weight:850;font-size:.64rem;letter-spacing:.13em;text-transform:uppercase;color:var(--mut)}
.fit-seg{display:flex;gap:5px;flex:1;flex-wrap:wrap}
.fit-seg button{flex:1;min-width:62px;border:1px solid var(--edge2);background:color-mix(in srgb,var(--mut) 9%,transparent);color:var(--ink2);font:800 .62rem/1 inherit;letter-spacing:.03em;padding:8px 6px;border-radius:11px;cursor:pointer;white-space:nowrap;transition:transform .08s ease}
.fit-seg button.on{background:linear-gradient(120deg,var(--ac),var(--ac2));color:#fff;border-color:transparent;box-shadow:0 3px 10px color-mix(in srgb,var(--ac) 38%,transparent),inset 0 1px 0 rgba(255,255,255,.35)}
.fit-seg button:active{transform:scale(.95)}
/* column layout by fit level (mobile → desktop scales up) */
.panel[data-fit="2"]{column-count:1;column-gap:14px}
.panel[data-fit="3"]{column-count:2;column-gap:14px}
.panel[data-fit="4"]{column-count:2;column-gap:12px}
@media(min-width:760px){
  .panel[data-fit="2"]{column-count:2;column-gap:16px}
  .panel[data-fit="3"]{column-count:3;column-gap:16px}
  .panel[data-fit="4"]{column-count:4;column-gap:14px}
}
.panel.dense .story,.panel.dense .crow,.panel.dense .trend,.panel.dense .hero,.panel.dense .gcard,.panel.dense .cat{break-inside:avoid;-webkit-column-break-inside:avoid}
/* collapse expandable cards to just the title until tapped (.xopen reveals everything incl. Ask/Follow) */
.panel.dense .story:not(.xopen) .sbody>:not(.st-t),
.panel.dense .trend:not(.xopen) .sbody>:not(.st-t),
.panel.dense .hero:not(.xopen)>:not(.st-t){display:none!important}
.panel.dense .story .tile{display:none}
.panel.dense .story:not(.xopen),.panel.dense .trend:not(.xopen),.panel.dense .hero:not(.xopen){cursor:pointer}
/* an expanded card breaks out of the columns to full, readable width */
.panel.dense .story.xopen,.panel.dense .trend.xopen,.panel.dense .hero.xopen{column-span:all;-webkit-column-span:all;outline:1px solid color-mix(in srgb,var(--ac) 45%,transparent);max-width:860px;margin:4px 0 12px!important;padding:14px 16px!important}
.panel.dense .story.xopen .st-t,.panel.dense .trend.xopen .st-t{font-size:1.02rem!important;line-height:1.4}
.panel.dense .story.xopen .st-s,.panel.dense .story.xopen .cs,.panel.dense .trend.xopen .st-s{font-size:.92rem!important;line-height:1.6}
.panel.dense .story.xopen .tile{display:inline-flex}
/* hide the density word-label on phones so it never runs off-screen */
@media(max-width:560px){ .fitbar{gap:8px;padding:9px 11px} .fb-lbl{display:none} .fit-seg button{min-width:0;font-size:.57rem;padding:8px 3px;letter-spacing:.02em} }
.panel.dense .legend,.panel.dense .phead,.panel.dense .brk,.panel.dense .glance,.panel.dense .news-toolbar,.panel.dense .since{display:none!important}
.panel.dense .sec{margin:9px 4px 4px;column-span:all;-webkit-column-span:all}
.panel.dense .story,.panel.dense .gcard,.panel.dense .trend,.panel.dense .crow{padding:8px 11px!important;margin:0 0 8px!important}
.panel.dense .st-t{font-size:.84rem!important;line-height:1.34;font-weight:700}
.panel.dense .hero .st-t{font-size:.92rem!important}
.panel.dense .cat>summary{font-size:.82rem}
.panel.dense .trank{transform:scale(.82)}

/* ===== full-screen article READER (opens from densified/fit-to-screen cards so a story fills the screen instead of a narrow column) ===== */
.reader{position:fixed;inset:0;z-index:85;display:none;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch}
.reader.open{display:block}
body.reader-lock{overflow:hidden}
.reader-inner{max-width:720px;margin:0 auto;padding:calc(60px + env(safe-area-inset-top)) 22px calc(56px + env(safe-area-inset-bottom))}
.reader-x{position:fixed;top:calc(14px + env(safe-area-inset-top));right:16px;z-index:86;width:42px;height:42px;border:none;border-radius:50%;cursor:pointer;font-size:1.1rem;color:#fff;background:linear-gradient(120deg,var(--ac),var(--ac2));box-shadow:0 5px 16px color-mix(in srgb,var(--ac) 45%,transparent),inset 0 1px 0 rgba(255,255,255,.35)}
.reader-x:active{transform:scale(.94)}
.reader-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.reader-chip{display:inline-flex;align-items:center;padding:4px 11px;border-radius:999px;font-size:.6rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;background:color-mix(in srgb,var(--pc,var(--ac)) 16%,transparent);color:var(--pc,var(--ac));border:1px solid color-mix(in srgb,var(--pc,var(--ac)) 34%,transparent)}
.reader-h1{font-size:1.6rem;line-height:1.28;font-weight:900;letter-spacing:-.01em;margin:2px 0 10px;color:var(--ink)}
.reader-meta{font-size:.76rem;font-weight:700;color:var(--mut);margin-bottom:16px}
.reader-glance{font-size:1.02rem;line-height:1.6;font-weight:700;color:var(--ink);margin:0 0 14px}
.reader-s{font-size:1.08rem;line-height:1.75;color:var(--ink);margin:0 0 18px}
.reader-why{font-size:.95rem;line-height:1.6;color:var(--ink);background:color-mix(in srgb,var(--ac) 9%,transparent);border-left:3px solid var(--ac);border-radius:10px;padding:11px 14px;margin:0 0 16px}

resting", "glance": "E-field boosts heat flow ~300%", "why": "Actively controlling heat transfer could improve device performance and cooling.", "url": "https://www.sciencedaily.com/releases/2026/07/260709160651.htm", "published": "2026-07-11T16:20:00+05:30", "src": "ScienceDaily", "assess": {"mag": 3, "timeline": "5-10 yrs", "evidence": "strong", "verdict": "Electric field switches heat conduction ~300%", "basis": "Lab result; tunable thermal transport demonstrated"}}, {"t": "Why gold never tarnishes has finally been explained", "s": "A computational study explains gold's tarnish resistance through how its surface atoms reconstruct, resolving a long-standing question in surface chemistry.", "tag": "Chemistry", "imp": "interesting", "glance": "Gold's tarnish resistance solved", "why": "A fundamental explanation with relevance to catalysis and clean-energy materials.", "url": "https://www.sciencedaily.com/releases/2026/07/260710003511.htm", "published": "2026-07-12T07:30:00+05:30", "src": "ScienceDaily", "assess": {"mag": 2, "timeline": "now", "evidence": "strong", "verdict": "Surface model explains why gold won't tarnish", "basis": "Computational surface-chemistry study"}}, {"t": "Europe unveils a paper concept to rival SpaceX's Starship", "s": "European researchers (DLR) unveiled a design study for a large reusable launch vehicle positioned as a future rival to SpaceX's Starship — a concept on paper, not a built rocket.", "tag": "Physics & Space", "imp": "interesting", "glance": "Europe's Starship-rival concept", "why": "Signals European ambition in reusable heavy-lift rockets, though it's early-stage.", "url": "https://www.sciencedaily.com/releases/2026/07/260710003526.htm", "published": "2026-07-11T05:20:00+05:30", "src": "ScienceDaily", "assess": {"mag": 2, "timeline": "10+ yrs", "evidence": "speculative", "verdict": "European reusable-rocket rival exists on paper", "basis": "DLR design study; concept stage, not hardware"}}, {"t": "Invasive Asian mantises are spreading across Europe, scientists warn", "s": "Researchers formally designated two Asian mantis species now established in Europe as invasive, warning they could disrupt native insect wildlife.", "tag": "Biology", "imp": "interesting", "glance": "Invasive mantises spread in Europe", "why": "An emerging invasive-species threat to European ecosystems.", "url": "https://www.sciencedaily.com/releases/2026/07/260710003540.htm", "published": "2026-07-11T13:30:00+05:30", "src": "ScienceDaily", "assess": {"mag": 2, "timeline": "now", "evidence": "strong", "verdict": "Two invasive mantis species established in Europe", "basis": "J. Orthoptera Research; taxonomic + ecological survey"}}, {"t": "Tiny bubbles could revolutionize inkjet printing", "s": "Controlling micro-bubbles could make inkjet printing more precise, with potential uses well beyond documents — in manufacturing, food and drug development.", "tag": "Technology", "imp": "interesting", "glance": "Micro-bubbles sharpen inkjet", "why": "More precise droplet control could improve industrial and biomedical printing.", "url": "https://www.sciencedaily.com/releases/2026/07/260711010112.htm", "published": "2026-07-11T09:30:00+05:30", "src": "ScienceDaily", "assess": {"mag": 2, "timeline": "3-5 yrs", "evidence": "strong", "verdict": "Micro-bubble control could sharpen inkjet printing", "basis": "Lab study of bubble dynamics in printing"}}, {"t": "Rare fossil goose rewrites the story of New Zealand's giant birds", "s": "A rare fossil goose is prompting scientists to revise the evolutionary story of New Zealand's giant birds, adding a new branch to their history.", "tag": "Biology", "imp": "interesting", "glance": "Fossil reshapes NZ bird story", "why": "Refines the evolutionary record of New Zealand's unique bird fauna.", "url": "https://www.sciencedaily.com/releases/2026/07/260709160637.htm", "published": "2026-07-11T06:20:00+05:30", "src": "ScienceDaily", "assess": {"mag": 2, "timeline": "now", "evidence": "strong", "verd d resting states, and recovers quickly after challenges. On the path to your vision, difficult circumstances aren't proof of danger; they're catalysts that train the nervous system to regulate. The deepest shift is surrender - releasing yourself as the anxious 'cause' of every outcome and genuinely doing what you want without gripping the results - which brings real peace and lets your body, brain and behavior align with the identity your vision requires."}, {"author": "Elmer O. Locker Jr", "title": "Mastering Counting — Unlock $100,000 Skills (Neville Goddard)", "url": "https://www.youtube.com/watch?v=TuBpRvg99RE", "published": "2026-07-12T05:15:00+05:30", "msg": "A short Neville-Goddard-style reading on the 'feeling is the secret' idea of manifestation: rather than straining for a goal, saturate your imagination with the felt reality of already having it. The speaker's image is of taking a single $100 bill and living with it — counting it, handling it, feeling and even 'smelling' it night and day — until, in the mind, counting a hundred thousand becomes as natural and real as counting one. The take-home: your persistent inner state, vividly and sensorially rehearsed, is the seed of the outer result — so tend the feeling of the wish fulfilled, not the anxiety of its absence."}, {"author": "AH Universe (Abraham Hicks)", "title": "Stop Facing Reality And Start Appreciating What You Want! ✨ Abraham Hicks 2026", "url": "https://www.youtube.com/watch?v=tPbO3tiFEGs", "published": "2026-07-11T18:30:16+05:30", "msg": "An Abraham-Hicks session on 'the art of allowing': what you consistently give your attention to becomes your reality, but a time-lag between thought and manifestation hides the link, so most people never connect how they feel to what shows up. Your emotions are the 'sensor' — the remedy is to stop numbly staring at unwanted current facts ('facing reality') and instead deliberately keep your attention on appreciation and the wanted version. You're always connected to source energy; focusing on what you don't want just 'pinches off' a bit of that flow, so choosing better-feeling thoughts lets more of it through."}]}, "youtube": {"count": 25, "note": "Today's uploads, each with a quick takeaway gisted from the actual transcript. Ordered most-useful first.", "groups": [{"h": "🤖 AI, Tech & Business", "items": [{"id": "nZmoq_XJW6Y", "vid": "nZmoq_XJW6Y", "t": "Big Tech Is Acting Kind of Dodgy At the Moment", "s": "ColdFusion argues the AI boom is propped up by 'circular financing': a BIS warning, forensic accountants showing hyperscaler profits nearly vanish once capex, stock comp and buybacks are counted, and a survey finding only 18¢ of every AI dollar reaches production.", "glance": "The AI/GPU boom may be inflated by circular deals between 'rival' firms and thin real profits — only ~18¢ of each AI dollar reaches production, the rest fixing AI's mistakes.", "url": "https://www.youtube.com/watch?v=nZmoq_XJW6Y", "published": "2026-07-11T23:59:00+05:30", "src": "ColdFusion", "subject": "ColdFusion", "pointsLabel": "Segment takeaways", "points": [{"t": "BIS warning", "s": "The Bank for International Settlements says AI spending and circular financing have grown risky enough to threaten the wider economy."}, {"t": "Only 18¢ per AI dollar lands", "s": "A ~2,500-company survey found only 18 cents of every dollar spent on AI reaches production; the rest goes to fixing AI-generated errors and rework."}, {"t": "Thin hyperscaler profits", "s": "Forensic accountants argue Microsoft/Google AI profits nearly disappear once capex, stock-based comp and related buybacks are stripped out."}, {"t": "Circular money-go-round", "s": "Google invests in Anthropic, which then commits ~$200B to Google Cloud; Nvidia sells GPUs to a middleman (Valor) that leases them back for xAI — inflating reported revenue."}, {"t": "China closes the gap", "s": "Cheap, downloadable Chinese open-weight models are 'good enough' for most uses; Cursor, Coinbase, Shopify, Airbnb and even Microsoft are reportedly switching."}, {"t": "Real-world AI flops", "s": "Starbucks dropped an AI inventory tool after misidentifications; Duolingo reversed its AI-first push after quality complaints."}]}, {"id": "Ti1V7OI2Rro", "vid": "Ti1V7OI2Rro", "t": "GPT-5.6, Grok 4.5, Seedream 5, robot surgery: this week in AI", "s": "A dense roundup: open-source real-time 'world models' now stream interactive 720p worlds on a single consumer GPU; xAI's Grok 4.5 is cheap and efficient; OpenAI's GPT-5.6 and new real-time GPT Live voice lead; plus new image models and acrobatic/surgical humanoid robots.", "glance": "Open-source world-model AIs can now generate endless interactive 3D worlds in real time on one consumer GPU — a preview of games that are generated, not coded.", "url": "https://www.youtube.com/watch?v=Ti1V7OI2Rro", "published": "2026-07-12T09:00:00+05:30", "src": "theAIsearch", "subject": "theAIsearch", "pointsLabel": "Segment takeaways", "points": [{"t": "Real-time world models", "s": "Lingbot World 2, Mirror and Pixorld generate endless interactive worlds at up to 720p/60fps on a single RTX-class GPU, many fully open-source."}, {"t": "Grok 4.5", "s": "xAI's new model (trained with Cursor) is very cheap and token-efficient and ties for #1 on a coding benchmark, though its 500K context is smaller than rivals'."}, {"t": "GPT-5.6 + GPT Live", "s": "OpenAI's flagship GPT-5.6 overshadowed the week; its new GPT Live voice feels like natural conversation you can interrupt, with live translation."}, {"t": "Meta Muse Spark 1.1", "s": "Meta's best model yet is a multimodal agent that can browse, code and self-check via screenshots — but still trails frontier models on independent leaderboards."}, {"t": "Tencent HY3", "s": "Tencent's open 295B-parameter mixture-of-experts model rivals far larger open models on coding and reasoning."}, {"t": "New image models", "s": "ByteDance's Seedream/Cream 5 Pro, a tiny open CFI-image model, and Reeve 2.1 push editable, text-accurate image generation."}, {"t": "Humanoid robots", "s": "A teleoperated Unitree G1 assisted in real surgery; Booster T2 does wall-jumps and mid-air flips."}]}, {"id": "Iir8dmNoNTg", "vid": "Iir8dmNoNTg", "t": "ChatGPT's latest update is massive", "s": "OpenAI shipped GPT-5.6 (in Soul/Terra/Luna tiers trading power for speed and cost), merged ChatGPT, Codex and its browser into one app with a personal-assistant 'work' mode that triages your email/calendar/Slack, and added ChatGPT Sites for prompting full websites and apps into existence.", "glance": "GPT-5.6 comes in three speed/cost tiers, and a new 'work' mode can read your email, calendar and Slack to build your priority list and do tasks for you.", "url": "https://www.youtube.com/watch?v=Iir8dmNoNTg", "published": "2026-07-11T21:30:00+05:30", "src": "Matt Wolfe (mreflow)", "subject": "Matt Wolfe (mreflow)"}, {"id": "tuZHgVLD4iY", "vid": "tuZHgVLD4iY", "t": "Elon tried to warn Apple. They didn't listen.", "s": "Breaks down Apple's lawsuit accusing OpenAI of a coordinated trade-secret-theft campaign — hiring/interviewing Apple engineers who allegedly brought confidential hardware files and even physical parts — and notes Apple is looking to unwind its ChatGPT-in-Siri deal. (Allegations are unproven.)", "glance": "Apple has sued OpenAI, alleging a coordinated campaign to steal confidential hardware secrets via poached engineers — and is reportedly looking to end its ChatGPT-Siri partnership.", "url": "https://www.youtube.com/watch?v=tuZHgVLD4iY", "published": "2026-07-11T18:00:00+05:30", "src": "Solving The Money Problem", "subject": "Solving The Money Problem"}, {"id": "GtrWMNsXghA", "vid": "GtrWMNsXghA", "t": "AI apps making $20,000+/month with one-person teams", "s": "Argues solo founders are building real recurring-revenue AI apps: e.g. a non-coder's Excel-formula helper grew from $25K/month in 2023 to a reported ~$226K/month by 2025. Wes's advice: use frontier models to research and build, max out your usage quota, ship something small, and get real users — but expect it to take years, not one year.", "glance": "Solo, non-technical founders are building AI apps earning tens of thousands a month; the playbook is to use frontier models to research/build, ship small, and get real users — over years, not months.", "url": "https://www.youtube.com/watch?v=GtrWMNsXghA", "published": "2026-07-12T12:30:00+05:30", "src": "Wes Roth", "subject": "Wes Roth"}, {"id": "k0mMfScdY8I", "t": "John Deere's road-building tech, hands-on", "s": "John Deere has ported the precision GPS/tracking automation from its farm equipment to road machinery: a demo milled, paved and rolled a stretch of road in under an hour, with the paver and supply truck auto-following each other to cut costly rework.", "glance": "John Deere's farm-grade GPS automation now runs road milling, paving and rolling — machines auto-follow each other with push-button precision, slashing rework on infrastructure jobs.", "subject": "Tech"}]}, {"h": "🔬 Science & Space", "items": [{"id": "5dO4uZWV2G8", "vid": "5dO4uZWV2G8", "t": "James Webb reveals what the universe's first stars really were", "s": "Explains the cosmic 'dark ages' — hundreds of millions of years when the universe held only hydrogen and no light — until gravity ignited the first stars, and how the James Webb Space Telescope was purpose-built to catch the faint, stretched-out infrared glow of that first starlight.", "glance": "For hundreds of millions of years the universe was totally dark; the first stars formed from pure hydrogen, and JWST was engineered specifically to detect their ancient, red-shifted first light.", "url": "https://www.youtube.com/watch?v=5dO4uZWV2G8", "published": "2026-07-12T00:30:00+05:30", "src": "Boring Science", "subject": "Boring Science"}, {"id": "v-sPFQm-MVE", "t": "China recovers a rocket booster with a giant net at sea", "s": "China recovered a Long March 10B first-stage booster for the first time, but with a very different approach from SpaceX: an offshore barge snares hooks on the booster with moving cables instead of using landing legs — lighter for the rocket, but needing a huge, complex recovery vessel. A step toward reusable Chinese rockets ahead of the Mengzhou crew program.", "glance": "China reused a rocket booster for the first time — caught at sea by cables on a barge rather than SpaceX-style legs, trading rocket weight for a big, complex recovery ship.", "subject": "Space"}]}, {"h": "🚗 Reviews & Practical", "items": [{"id": "z7TRwTrf7ak", "vid": "z7TRwTrf7ak", "t": "Tata Sierra EV — driving impressions", "s": "First drive of the Tata Sierra EV: praises the ride quality and one of the best suspensions he's felt, strong EV acceleration and a well-loaded even-base variant; his gripes are the pricing (base variant nudges ~₹20 lakh on-road) and no lumbar support. Advice: wait 3–4 months for early niggles to be sorted.", "glance": "The Tata Sierra EV drives well with excellent suspension and strong acceleration, but on-road pricing pushes ~₹20 lakh even for the base — Geekyranjit suggests waiting 3–4 months for early bugs to settle.", "url": "https://www.youtube.com/watch?v=z7TRwTrf7ak", "published": "2026-07-12T12:00:00+05:30", "src": "Geekyranjit", "subject": "Geekyranjit"}, {"id": "2K-aW4H_wfI", "vid": "2K-aW4H_wfI", "t": "Garmin Forerunner 170 review", "s": "TechRadar finds the entry-level Garmin Forerunner 170 (from $300; Music from $350) surprisingly accurate on heart rate despite an older sensor, and good value versus pricier Garmins and Apple Watches — a solid first running watch, though its feature set is narrower than premium models.", "glance": "Garmin's entry Forerunner 170 tracks heart rate surprisingly accurately for its price and is good value as a first running watch, if you don't need premium features.", "url": "https://www.youtube.com/watch?v=2K-aW4H_wfI", "published": "2026-07-12T09:30:00+05:30", "src": "TechRadar", "subject": "TechRadar"}]}, {"h": "🌍 World & Society", "items": [{"id": "lxxf2h56z7o", "vid": "lxxf2h56z7o", "t": "Inside Frankfurt's open-air drug zone", "s": "An on-the-ground investigation of Frankfurt's 'Frankfurt way' harm-reduction approach — supervised drug-use rooms meant to treat addiction as a health issue — and the concentrated zone of open drug use, homelessness and crime that has formed around the main station, weighing whether the policy saves lives or entrenches chaos.", "glance": "Frankfurt's harm-reduction drug policy (supervised use rooms) has concentrated open drug use and disorder near its main station — a real-world look at the trade-offs of treating addiction as health, not crime.", "url": "https://www.youtube.com/watch?v=lxxf2h56z7o", "published": "2026-07-12T00:00:00+05:30", "src": "Tyler Oliveira", "subject": "Tyler Oliveira"}, {"id": "L1bAR6SKriM", "vid": "L1bAR6SKriM", "t": "Attention is algorithmically controlled", "s": "A short reflection: our attention is now shaped by a multi-billion-dollar 'attention economy' engineered to capture focus, leaving many feeling a loss of agency over their own minds — and pairs it with a critique of reflexive materialism about consciousness.", "glance": "Your attention is actively engineered by a billion-dollar 'attention economy'; reclaiming agency over your own focus is a deliberate, counter-cultural act.", "url": "https://www.youtube.com/watch?v=L1bAR6SKriM", "published": "2026-07-12T12:45:00+05:30", "src": "Adventures in Awareness", "subject": "Adventures in Awareness"}]}, {"h": "🎬 Shorts", "items": [{"id": "9E2epPWToeM", "vid": "9E2epPWToeM", "t": "1X's robot hand with human-level dexterity", "s": "1X's new robotic hand has 25 degrees of freedom, with motors in the forearm pulling artificial 'tendons' (like a human hand) so it can swing a kettlebell yet pick a grape without crushing it — and it senses pressure through those tendons, learning from touch.", "glance": "1X built a tendon-driven robot hand with 25 degrees of freedom that can both swing a kettlebell and pick a grape — potentially solving robotics' hardest problem, dexterity.", "url": "https://www.youtube.com/watch?v=9E2epPWToeM", "published": "2026-07-11T21:00:00+05:30", "src": "Varun Mayya", "subject": "Varun Mayya", "short": true}, {"id": "aCE5gOi0lYA", "vid": "aCE5gOi0lYA", "t": "Brad Gerstner on Anthropic's revenue ramp", "s": "On All-In, investor Brad Gerstner calls Anthropic's growth unprecedented — arguing that if it ends the year over $100B it could 3–5x again, a scale of incremental revenue never seen in Silicon Valley — because 'intelligence' is the largest addressable market in history.", "glance": "Investor Brad Gerstner says Anthropic's revenue trajectory is unlike anything in tech history, because AI 'intelligence' is the biggest market ever addressed.", "url": "https://www.youtube.com/watch?v=aCE5gOi0lYA", "published": "2026-07-11T20:00:00+05:30", "src": "All-In Podcast", "subject": "All-In Podcast", "short": true}, {"id": "oDXJ5Zztjpc", "t": "VW may cut up to 100,000 jobs", "s": "VW's CEO signalled up to 100,000 possible job cuts and admitted on the record that the company's business model isn't working — a crisis analysts say was long flagged by red flags the company ignored.", "glance": "VW is weighing up to 100,000 job cuts as its CEO concedes the business model is broken — a warning sign long visible in one of the world's biggest automakers.", "short": true, "subject": "Business"}, {"id": "X48-ZFXL598", "t": "Why cheap Chinese EV prices aren't the whole story", "s": "The point isn't how many EVs you build or your cost base — it's the price to the customer. Selling an 'affordable' $30k EV that costs $50k to make isn't a sustainable business, which is the trap analysts warn Western automakers face trying to price-match Chinese EVs.", "glance": "Matching Chinese EV prices by selling at a per-vehicle loss isn't a business model — affordability only counts if the price you offer beats what it costs you to build.", "short": true, "subject": "Business"}, {"id": "3y_04Zr60J4", "t": "Information theory: the foundation of the digital age", "s": "Claude Shannon's 1948 'A Mathematical Theory of Communication' defined the bit as the fundamental unit of information and borrowed the math of thermodynamics to set the hard limits of data compression — routinely ranked among the greatest scientific ideas, and the namesake of 'Claude'.", "glance": "Claude Shannon's 1948 information theory made the 'bit' the atom of data and used thermodynamics to fix the limits of compression — the bedrock of everything digital.", "short": true, "subject": "Science"}, {"id": "JUHN6H8dH9g", "t": "Einstein's EPR paradox and the birth of computer science", "s": "Two Princeton milestones: Einstein's 1935 EPR paper argued quantum mechanics was incomplete and needed 'hidden variables', while Church and Turing's 1936 work (lambda calculus, Turing machine) proved some problems are formally undecidable — the mathematical foundation of computer science.", "glance": "1935–36 at Princeton: Einstein's EPR paper challenged quantum theory's completeness, and Church & Turing proved some problems are unsolvable by any algorithm — founding computer science.", "short": true, "subject": "Science"}, {"id": "_cJ495dkEVU", "t": "The real story of lab-grown diamonds", "s": "The first reproducible synthetic diamond was made at GE in 1954; today's chemical-vapour-deposition gem diamonds are chemically identical to mined ones and have helped undercut the blood-diamond trade, while remaining vital for industry.", "glance": "Lab diamonds (first made at GE in 1954, now grown by vapour deposition) are chemically identical to mined ones and have helped weaken the blood-diamond trade.", "short": true, "subject": "Science"}, {"id": "4RgS2RfHtSY", "vid": "4RgS2RfHtSY", "t": "Why I'm loading up on SpaceX now", "s": "The creator explains he's building a SpaceX position (aiming for roughly two-thirds SpaceX vs Tesla long-term) ahead of the IPO, betting on Starlink's growth, terrestrial compute and Starship V3 — while acknowledging SpaceX has big 'unknown unknowns'.", "glance": "One investor is shifting toward SpaceX over Tesla ahead of the IPO, betting on Starlink, space compute and Starship V3 — while admitting the risks are large and unknown.", "url": "https://www.youtube.com/watch?v=4RgS2RfHtSY", "published": "2026-07-11T19:30:00+05:30", "src": "Solving The Money Problem", "subject": "Solving The Money Problem", "short": true}, {"id": "GkwToGGWLC0", "vid": "GkwToGGWLC0", "t": "L-Tyrosine for focus", "s": "Ruri uses L-tyrosine (≈500–2,000mg on an empty stomach, 30–60 min before focus work) as the raw material the brain uses to make dopamine and noradrenaline — but notes it only helps when you're depleted (bad sleep, high stress) and does little if you're well-rested.", "glance": "L-tyrosine (~500–2,000mg before focus work) can sharpen concentration by feeding dopamine production — but only when you're sleep-deprived or stressed, not when well-rested.", "url": "https://www.youtube.com/watch?v=GkwToGGWLC0", "published": "2026-07-12T08:30:00+05:30", "src": "Ruri Ohama", "subject": "Ruri Ohama", "short": true}, {"id": "Uv_Nj3zfDI8", "vid": "Uv_Nj3zfDI8", "t": "Signal vs noise: your top 3–5 for the day", "s": "A simple focus rule: your 'signal' is just the top 3–5 things you must finish in the next ~18 waking hours; 'noise' is anything that stops you doing them. Sorting everything into signal or noise changes how you handle the day.", "glance": "Define each day by 'signal' — the 3–5 things you must finish in the next 18 hours — and treat everything else as 'noise' to be minimized.", "url": "https://www.youtube.com/watch?v=Uv_Nj3zfDI8", "published": "2026-07-12T09:00:00+05:30", "src": "Ruri Ohama", "subject": "Ruri Ohama", "short": true}, {"id": "kDugYO1kOJM", "vid": "kDugYO1kOJM", "t": "Accept weaknesses instead of fighting them", "s": "Shares a story from a Japanese psychiatrist: a parent stopped punishing an ADHD child for losing erasers and simply accepted that 'erasers get lost', buying new ones — removing the stress, shame and conflict. The lesson: accepting a weakness can defuse it better than fighting it.", "glance": "Accepting a weakness (like an ADHD child constantly losing erasers) instead of punishing it removes the shame and stress — sometimes acceptance beats correction.", "url": "https://www.youtube.com/watch?v=kDugYO1kOJM", "published": "2026-07-12T08:00:00+05:30", "src": "Ruri Ohama", "subject": "Ruri Ohama", "short": true}, {"id": "B1ZWh6oqKMI", "vid": "B1ZWh6oqKMI", "t": "Building success around ADHD, not 'fixing' it", "s": "Ruri says she grew a YouTube channel from zero to ~1.5M subscribers and supported her family without 'fixing' her ADHD — while still struggling with ordinary tasks (missing university-application deadlines, paying taxes late), a candid reminder that external success and daily executive-function struggles can coexist.", "glance": "You can build real success around ADHD rather than 'curing' it — outward achievement and ongoing struggles with everyday tasks often coexist.", "url": "https://www.youtube.com/watch?v=B1ZWh6oqKMI", "published": "2026-07-12T09:15:00+05:30", "src": "Ruri Ohama", "subject": "Ruri Ohama", "short": true}, {"id": "9zkC40DU4H8", "vid": "9zkC40DU4H8", "t": "Create positive prana, not positive thinking", "s": "Argues you should spend ~60% of your time in 'live', energetic experiences (people, children, animals, nature) to build real positive energy ('prana'), rather than relying on effortful positive thinking — e.g. spending an hour or two looking at flowers over two weeks can genuinely shift your outlook.", "glance": "Build genuine positivity by spending most of your time in live, energizing experiences (nature, people, animals) rather than forcing effortful 'positive thinking'.", "url": "https://www.youtube.com/watch?v=9zkC40DU4H8", "published": "2026-07-12T11:00:00+05:30", "src": "Satya Speaks", "subject": "Satya Speaks", "short": true}]}]}, "scienceUpdated": "2026-07-12T15:22:16+05:30"};

function urlDate(u){ if(!u) return null; let m;
  m=u.match(/\/(20\d{2})\/(\d{2})\/(\d{2})(?:[\/?#]|$)/); if(m) return `${m[1]}-${m[2]}-${m[3]}`;

function renderNews(){
  const p=document.getElementById("p-news"); if(!p) return; p.innerHTML="";
  const N=DATA.news||{}; const cats=N.cats||[];
  if(!cats.length){ const e=document.createElement("p"); e.className="empty"; e.textContent="No news loaded yet — tap Update."; p.appendChild(e); return; }
  sinceStrip(p);
  const all=[]; cats.forEach(c=>(c.items||[]).forEach(it=>{ it.__cat=c.h; all.push(it); }));
  const hero=heroPick(all);
  if(hero){ p.appendChild(sec("Lead story")); const h=story(hero,{hero:true}); const w=h.querySelector(".why2"); if(w){const b=w.querySelector("b"); if(b)b.textContent="Why it leads"; w.className="why";} p.appendChild(h); }
  // density toolbar
  let mode=store.get("newsDensity","compact");
  const total=all.filter(isRealItem).length;
  const bar=document.createElement("div"); bar.className="news-toolbar";
  bar.innerHTML=`<span>${total} stories · ${cats.filter(c=>(c.items||[]).length).length} categories</span>
    <button class="mini" id="newsExpandAll" style="border:1px solid var(--edge2);border-radius:999px;padding:5px 11px;font-weight:800;font-size:.62rem">⇕ Expand all</button>
    <div class="dens-seg"><button data-m="compact">Compact</button><button data-m="cards">Cards</button></div>`;
  p.appendChild(bar);
  // in-brief (News only)
  const gl=[]; cats.forEach(c=>(c.items||[]).filter(isRealItem).slice(0,2).forEach(it=>gl.push({tag:c.tag||c.h,g:it.glance||it.t})));
  if(gl.length){ const box=document.createElement("details"); box.className="glance glass"; box.open=true;
    const byTag={}; gl.forEach(x=>{(byTag[x.tag]=byTag[x.tag]||[]).push(x.g);});
    box.innerHTML=`<summary>In brief · today in 30 seconds</summary><div class="glance-body">${Object.keys(byTag).map(t=>`<div class="glance-row"><span class="glance-tag">${esc(t)}</span><span class="glance-items">${byTag[t].map(esc).join(" · ")}</span></div>`).join("")}</div>`;
    p.appendChild(box); }
  const listWrap=document.createElement("div"); listWrap.id="newsList"; p.appendChild(listWrap);
  function renderCompact(){
    listWrap.innerHTML="";
    cats.forEach((c,ci)=>{ const items=(c.items||[]).filter(it=>!(hero&&it===hero)); if(!items.length) return;

      const d=document.createElement("details"); d.className="cat gcard"; if(store.get("newsCatsOpen",false)&&ci<1) d.open=true;
      const chip=unread>0?`<span class="cn unread">${unread} new</span>`:`<span class="cn">${real.length}</span>`;
      d.innerHTML=`<summary><span class="chev">▶</span>${esc(c.h)}${chip}</summary>`;
      items.forEach(it=>{
        const row=document.createElement("div"); row.className="crow srow"+(isReadItem(it)?" read":"");
        STORY.set(row,it); ELEMS.set(cardKey(it),row);
        row.dataset.title=it.t||""; row.dataset.summary=it.s||"";
        const impc=({critical:"#ef4444",important:"#f59e0b",interesting:"#3b82f6",noise:"#94a3b8"})[(it.imp||"").toLowerCase()]||"#94a3b8";
        const link=it.url?`<a href="${esc(it.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:var(--ac);font-weight:700;font-size:.72rem">open ↗</a>`:"";
        row.innerHTML=`<span class="cd" style="--cdc:${impc};background:${impc}"></span><div class="ct">${esc(it.t)} <span class="csrc">· ${esc(it.src||it.__cat||"")}</span>
          <div class="cx">${it.s?`<div class="cs">${esc(it.s)}</div>`:""}${factChips(it.facts,impc)}${it.why?`<div class="why2"><b>Why it matters</b>${esc(it.why)}</div>`:""}${it.forYou?`<div class="fy">★ ${esc(it.forYou)}</div>`:""}<div class="more"></div><div class="acts" onclick="event.stopPropagation()"><button class="mini act-ask">Ask</button>${followBtn(it)}<span style="margin-left:auto">${link}</span></div><div class="ask-box" style="display:none" onclick="event.stopPropagation()"><input type="text" class="ask-in" placeholder="Ask anything about this…"><button class="mini ask-go">Ask</button></div></div></div>`;
        row.querySelector(".act-ask").onclick=e=>toggleAsk(e.target);
        wireFollow(row,it);
        const cgi=row.querySelector(".ask-in"); row.querySelector(".ask-go").onclick=()=>askQuestion(row,cgi);
        cgi.addEventListener("keydown",e=>{if(e.key==="Enter")askQuestion(row,cgi);});
        row.addEventListener("click",()=>{ row.classList.toggle("open"); if(!row.classList.contains("read")){ row.classList.add("read"); setRead(it,true); const chp=d.querySelector(".cn"); if(chp){ const u=items.filter(x=>isRealItem(x)&&!isReadItem(x)).length; chp.className="cn"+(u>0?" unread":""); chp.textContent=u>0?u+" new":real.length; } } });
        d.appendChild(row);
      });
      listWrap.appendChild(d);
    });
    const done=document.createElement("div"); done.className="allcaught"; done.textContent="— that's everything, you're all caught up —"; listWrap.appendChild(done);
  }
  function renderCards(){
    listWrap.innerHTML="";
    cats.forEach(c=>{ const items=(c.items||[]); if(!items.length) return;
      listWrap.appendChild(sec(c.h));
      items.forEach(it=>{ if(hero&&it===hero) return; listWrap.appendChild(story(it,{})); });
    });
  }
  function setMode(m){ mode=m; store.set("newsDensity",m);
    [...bar.querySelectorAll(".dens-seg button")].forEach(b=>b.classList.toggle("on",b.dataset.m===m));
    if(m==="compact") renderCompact(); else renderCards(); }
  [...bar.querySelectorAll(".dens-seg button")].forEach(b=>b.onclick=()=>setMode(b.dataset.m));
  { const xb=bar.querySelector("#newsExpandAll"); if(xb) xb.onclick=()=>{ const cats=[...listWrap.querySelectorAll("details.cat")]; const anyClosed=cats.some(c=>!c.open); cats.forEach(c=>c.open=anyClosed); xb.textContent=anyClosed?"⇕ Collapse all":"⇕ Expand all"; }; }
  setMode(mode);
}

function classifyYT(it){
  const S=String(it.subject||"").toLowerCase();
  const hay=((it.t||"")+" "+(it.s||"")+" "+(it.glance||"")+" "+(it.tag||"")).toLowerCase();
  const has=re=>re.test(hay);
  if(S==="mindset"||has(/spiritual|meditat|consciousness|enlighten|manifest|non-dual|awareness|\bsoul\b|\bgod\b|divine|ego death|surrender|awaken|mindful/)) return "spirit";
  if(has(/philosoph|stoic|existential|metaphysic|epistem|\bethics\b|meaning of life|nietzsche|nihilis|absurd|virtue|wisdom of|the good life/)) return "phil";
  if(S==="health"||has(/\bhealth\b|fitness|workout|\bdiet\b|nutrition|\bsleep\b|longevity|medical|hair loss|\bmuscle\b|disease|mental health|therapy|dopamine|fasting|cardio|protein/)) return "health";
  if(S==="ai"||has(/\bai\b|artificial intelligence|\bgpt\b|\bllm\b|chatgpt|openai|anthropic|\bclaude\b|gemini|\bgrok\b|\bagent\b|machine learning|neural net|diffusion|prompt/)) return "ai";
  if(S==="tech"||S==="space"||S==="auto"||has(/robot|humanoid|\bchip\b|semiconductor|quantum|gadget|hardware|software|coding|programming|engineering|spacex|rocket|\bdrone\b|\bev\b|tesla|iphone|android|app\b/)) return "tech";
  if(S==="money"||S==="world"||has(/market|econom|business|\bstock\b|geopolit|election|\bwar\b|policy|startup|funding|earnings|tariff/)) return "news";
  return "other";
}

// ---- "Since yesterday" memory strip (renders DATA.since when the task provides it) ----
function sinceStrip(p){
  const S=(typeof DATA.since==="object"&&DATA.since)?DATA.since:null;
  const items=(S&&S.items)||[]; if(!items.length) return;
  const KIND={thread:["Δ MOVED","var(--ac)"],followup:["★ FOLLOW-UP","#f2b705"],receipt:["✓ RECEIPT","#22c55e"]};
  const box=document.createElement("div"); box.className="since glass";
  box.innerHTML='<div class="sh">Since yesterday — your world model</div>'+items.slice(0,6).map(it=>{
    let k=KIND[(it.kind||"thread").toLowerCase()]||KIND.thread;
    if((it.kind||"")==="receipt"&&(it.outcome||"")==="busted") k=["✗ BUSTED","#ef4444"];
    const day=it.day?`<span class="sd">Day ${esc(String(it.day))}</span>`:"";
    const title=`<b>${esc(it.t)}</b>`;
    return `<div class="srow2">${pillH(k[1],k[0])}<span>${title}<span class="sn"> — ${esc(it.note||"")}</span></span>${day}</div>`;
  }).join("");
  p.appendChild(box);
}

  const DELTA={new:["🆕 NEW","d-new"],rising:["▲ RISING","d-rising"],steady:["▬ STEADY","d-steady"],cooling:["▼ COOLING","d-cooling"]};
  const heatPct=v=>Math.max(2,Math.min(100,Math.round(+v||0)));

// ---- filter ----
const filterBar=document.getElementById("filterBar"),filterIn=document.getElementById("filterIn"),filterN=document.getElementById("filterN");
document.getElementById("filterBtn").onclick=()=>{ const open=!filterBar.classList.contains("open"); filterBar.classList.toggle("open",open); if(open) filterIn.focus(); else { filterIn.value=""; applyFilter(); } };
let filterT=null;
filterIn.addEventListener("input",()=>{ if(filterT)clearTimeout(filterT); filterT=setTimeout(applyFilter,120); });
function activePanel(){ return document.querySelector(".panel.active"); }
function applyFilter(){
  const p=activePanel(); if(!p) return;
  const q=(filterIn.value||"").trim().toLowerCase();
  p.classList.toggle("filtering",!!q);
  const stories=[...p.querySelectorAll(".srow")];
  if(!q){ stories.forEach(s=>s.hidden=false); p.querySelectorAll("details").forEach(d=>{ if(d.dataset.wasOpen!==undefined){ d.open=d.dataset.wasOpen==="1"; delete d.dataset.wasOpen; } }); filterN.textContent=""; return; }
  p.querySelectorAll("details").forEach(d=>{ if(d.dataset.wasOpen===undefined) d.dataset.wasOpen=d.open?"1":"0"; d.open=true; });
  let hits=0; stories.forEach(s=>{ const hit=(s.textContent||"").toLowerCase().includes(q); s.hidden=!hit; if(hit)hits++; });
  filterN.textContent=hits+" match"+(hits===1?"":"es");
  kbdIdx=-1; clearKbdCur();
}
// ---- keyboard ----
let kbdIdx=-1;
function visibleStories(){ const p=activePanel(); if(!p) return []; return [...p.querySelectorAll(".srow")].filter(s=>!s.hidden&&s.offsetParent!==null); }
function clearKbdCur(){ document.querySelectorAll(".srow.kbd-cur").forEach(s=>s.classList.remove("kbd-cur")); }
function kbdMove(dir){ const list=visibleStories(); if(!list.length) return;
  kbdIdx=Math.max(0,Math.min(list.length-1,(kbdIdx<0?(dir>0?0:list.length-1):kbdIdx+dir)));
  clearKbdCur(); const s=list[kbdIdx]; s.classList.add("kbd-cur");
  let d=s.closest("details"); while(d){ d.open=true; d=d.parentElement?d.parentElement.closest("details"):null; }
  if(s.scrollIntoView) try{ s.scrollIntoView({behavior:"smooth",block:"center"}); }catch(e){ s.scrollIntoView(); } }
function kbdCur(){ const l=visibleStories(); return (kbdIdx>=0&&kbdIdx<l.length)?l[kbdIdx]:null; }
const kbdHelp=document.getElementById("kbdHelp");
document.getElementById("kbdX").onclick=()=>kbdHelp.classList.remove("open");
kbdHelp.addEventListener("click",e=>{ if(e.target===kbdHelp) kbdHelp.classList.remove("open"); });
document.addEventListener("keydown",e=>{
  const tgt=e.target;
  const typing=tgt&&(tgt.tagName==="INPUT"||tgt.tagName==="TEXTAREA"||tgt.tagName==="SELECT"||tgt.isContentEditable);
  if(e.key==="Escape"){
    if(kbdHelp.classList.contains("open")){ kbdHelp.classList.remove("open"); return; }
    if(gradeOvl.classList.contains("open")){ closeGrade(); return; }
    if(typing&&tgt===filterIn){ if(filterIn.value){ filterIn.value=""; applyFilter(); } else { filterBar.classList.remove("open"); filterIn.blur(); } return; }
    if(typing){ tgt.blur(); return; }
    clearKbdCur(); kbdIdx=-1; return; }
  if(typing||e.metaKey||e.ctrlKey||e.altKey) return;
  if(e.key==="?"){ kbdHelp.classList.toggle("open"); e.preventDefault(); return; }
  if(e.key==="/"){ filterBar.classList.add("open"); filterIn.focus(); e.preventDefault(); return; }
  if(e.key>="1"&&e.key<="9"){ const t=TABS[+e.key-1]; if(t) activate(t.id); return; }
  if(e.key==="j"){ kbdMove(1); return; }
  if(e.key==="k"){ kbdMove(-1); return; }
  if(e.key==="t"){ if(window.cycleTheme) cycleTheme(); return; }
  const cur=kbdCur(); if(!cur) return;
  if(e.key==="Enter"||e.key==="o"){ const a=cur.querySelector('a[href][target="_blank"]'); if(a) a.click(); return; }
  if(e.key==="r"){ const it=STORY.get(cur); if(it){ const now=!cur.classList.contains("read"); cur.classList.toggle("read",now); setRead(it,now); showToast(now?"Marked read":"Marked unread");
      const cat=cur.closest("details.cat"); if(cat){ const rows=[...cat.querySelectorAll(".crow")]; const u=rows.filter(x=>{const i=STORY.get(x);return i&&isRealItem(i)&&!isReadItem(i);}).length; const chp=cat.querySelector(".cn"); if(chp){ chp.className="cn"+(u>0?" unread":""); chp.textContent=u>0?u+" new":String(rows.filter(x=>{const i=STORY.get(x);return i&&isRealItem(i);}).length); } } } return; }
});
// ---- manifest ----
(function(){ try{
  var icon=document.querySelector('link[rel="apple-touch-icon"]').getAttribute("href");
  var m={name:"Daily Dashboard",short_name:"Dashboard",display:"standalone",orientation:"portrait",background_color:"#eef1f8",theme_color:"#eef1f8",start_url:".",icons:[{src:icon,sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}]};
  var blob=new Blob([JSON.stringify(m)],{type:"application/manifest+json"});
  var link=document.createElement("link"); link.rel="manifest"; link.href=URL.createObjectURL(blob); document.head.appendChild(link);
}catch(e){} })();
// ---- premium motion: masthead dissolve + reveal-on-scroll ----
(function(){
  if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const mast=document.getElementById("mastFull"); let lastY=window.scrollY||0, ticking=false;
  function onScroll(){ const y=window.scrollY||0;
    if(mast){ if(y>70 && y>=lastY) mast.classList.add("mast-hide");
      else if(y<lastY-3 || y<48) mast.classList.remove("mast-hide"); }
    lastY=y; ticking=false; }
  window.addEventListener("scroll",()=>{ if(!ticking){ requestAnimationFrame(onScroll); ticking=true; } },{passive:true});
})();
window.__revealIO = (window.IntersectionObserver)? new IntersectionObserver((es,o)=>{
  es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); o.unobserve(e.target); } });
},{threshold:.1,rootMargin:"0px 0px -36px 0px"}) : null;
function armReveals(panel){ /* reveal-on-scroll disabled 2026-07-11 — cards render immediately, no fade-in lag */ }
// ---- FAB options menu ----
(function(){ const fb=document.getElementById("fabMenu"), sh=document.getElementById("fabSheet"); if(!fb||!sh) return;
  fb.addEventListener("click",e=>{ e.stopPropagation(); sh.classList.toggle("open"); });
  document.addEventListener("click",e=>{ if(sh.classList.contains("open")&&!fb.contains(e.target)&&!sh.contains(e.target)) sh.classList.remove("open"); });
  sh.querySelectorAll(".fab-item").forEach(b=>b.addEventListener("click",()=>{ if(b.id!=="filterBtn") sh.classList.remove("open"); }));
})();
// ---- boot ----
refreshBadges();
const savedTab=store.get("tab","news");
activate(TABS.some(t=>t.id===savedTab)?savedTab:"news");
</script>
