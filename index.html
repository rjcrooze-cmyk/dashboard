<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Daily Dashboard</title>
<meta name="theme-color" content="#faf9f7">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20512%20512'%3E%3Crect%20width='512'%20height='512'%20rx='110'%20fill='%233b6ea5'/%3E%3Ccircle%20cx='256'%20cy='256'%20r='96'%20fill='%23ffd66b'/%3E%3C/svg%3E">
<style>
:root{ color-scheme: light; --bg:#faf9f7; --card:#ffffff; --ink:#1f2328; --muted:#6b7280; --line:#e7e5e1; --accent:#3b6ea5; --accent2:#7a5cc4; --chip:#f1efea; --good:#2f7d5b; }
:root[data-theme="dark"]{ color-scheme: dark; --bg:#15171a; --card:#1e2126; --ink:#e8eaed; --muted:#9aa3ad; --line:#2c3036; --accent:#6ea3da; --accent2:#a98ce0; --chip:#262a30; --good:#5fc28c; }
@media (prefers-color-scheme: dark){ :root:not([data-theme="light"]){ color-scheme: dark; --bg:#15171a; --card:#1e2126; --ink:#e8eaed; --muted:#9aa3ad; --line:#2c3036; --accent:#6ea3da; --accent2:#a98ce0; --chip:#262a30; --good:#5fc28c; } }
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
.wrap{max-width:760px;margin:0 auto;padding:18px 16px 60px}
header{display:flex;flex-direction:column;gap:10px;margin-bottom:6px}
.titlerow{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
h1{font-size:20px;margin:0;letter-spacing:-.2px}
.date{color:var(--muted);font-size:13px}
.title-right{display:flex;align-items:center;gap:10px}
.update-all{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap}
.update-all:hover{opacity:.92}
.update-all:disabled{opacity:.6;cursor:default}
.update-status{color:var(--accent);font-size:12.5px;margin-top:2px;min-height:0}
.update-status:empty{display:none}
.affirm{background:linear-gradient(90deg,#f3effa,#eef4fb);border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:14px;display:flex;align-items:center;gap:10px}
.affirm b{font-weight:600}
.affirm .a-text{flex:1}
.icon-btn{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:3px 8px;cursor:pointer;font-size:13px;color:var(--muted)}
.icon-btn:hover{color:var(--ink);border-color:#d8d5cf}
nav.tabs{position:relative;display:flex;gap:6px;flex-wrap:wrap;margin:14px 0 16px;border-bottom:1px solid var(--line);padding-bottom:10px}
.tab{display:inline-flex;align-items:center;gap:6px;border:1px solid transparent;background:transparent;border-radius:999px;padding:6px 13px;cursor:pointer;font-size:13.5px;color:var(--muted)}
.tab .ico{font-size:14px;line-height:1}
.tab:hover{color:var(--ink)}
.tab.active{background:var(--ink);color:#fff}
.panel{display:none;animation:fade .2s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.grp{margin:0 0 22px}
.grp h2{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 10px;font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px}
.card .t{font-weight:600;font-size:15px;margin:0 0 4px}
.card .t a{color:var(--ink);text-decoration:none}
.card .t a:hover{text-decoration:underline}
.card .s{color:#3a3f45;margin:0}
.ts-tag{display:inline-block;background:#eef4fb;color:var(--accent);font-size:10.5px;padding:1px 8px;border-radius:6px;margin:0 0 6px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.ts-seen{color:var(--muted);font-size:11.5px;margin:6px 0 0}
.ts-seen b{color:#5a6473;font-weight:600}
.msg-card{background:linear-gradient(135deg,#f3effa,#eef4fb);border:1px solid var(--line);border-left:4px solid var(--accent2);border-radius:14px;padding:16px 18px;margin-bottom:14px}
.msg-author{font-weight:700;font-size:12.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--accent2);margin-bottom:9px}
.msg-title{font-weight:500;color:var(--muted);font-size:12px;text-transform:none;letter-spacing:0}
.msg-body{margin:0;font-size:15.5px;line-height:1.62;color:#2a2f35}
.msg-link{margin-top:11px}
.msg-link a{font-size:12.5px;color:var(--accent);text-decoration:none}
.msg-link a:hover{text-decoration:underline}
.eli{background:#fbf7ee;border:1px dashed #e3d9c2;border-radius:9px;padding:7px 10px;margin-top:8px;font-size:13.5px;color:#5a4e33}
.eli b{color:#7a6a3f}
.pts{margin-top:9px;border:1px solid var(--line);border-radius:9px;background:#fbfbfa;overflow:hidden}
.pts>summary{cursor:pointer;list-style:none;padding:8px 12px;font-size:13px;font-weight:600;color:var(--accent);user-select:none}
.pts>summary::-webkit-details-marker{display:none}
.pts>summary::after{content:"  ▾";color:var(--muted);font-weight:400}
.pts[open]>summary::after{content:"  ▴"}
.pts[open]>summary{border-bottom:1px solid var(--line)}
.pt{padding:8px 12px;border-top:1px solid var(--line);font-size:13.5px}
.pt:first-of-type{border-top:none}
.pt .pt-t{font-weight:600;color:var(--ink)}
.pt .pt-s{display:block;color:#3a3f45;margin-top:2px}
.tw{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-top:1px solid var(--line)}
.tw:first-of-type{border-top:none}
.tw a.tw-time{flex:0 0 auto;background:#eef4fb;color:var(--accent);font-size:11.5px;font-weight:700;padding:2px 8px;border-radius:6px;text-decoration:none;font-variant-numeric:tabular-nums;margin-top:2px}
.tw a.tw-time:hover{background:#dce8f6}
.tw .tw-body{flex:1}
.tw .tw-ctx{color:var(--muted);font-size:13px;margin:0 0 2px}
.tw .tw-said{margin:0;font-size:14.5px;color:#1f2328}
.tw .tw-kind{display:inline-block;background:#f1efea;color:#5a6473;font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:1px 6px;border-radius:5px}
a.thumb-link{display:block;position:relative;width:120px;margin:0 0 8px}
a.thumb-link .thumb{display:block;width:120px;height:auto;border-radius:8px;background:#ece9e4}
a.thumb-link .play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;pointer-events:none}
a.thumb-link .play::after{content:"";border-style:solid;border-width:6px 0 6px 10px;border-color:transparent transparent transparent #fff;margin-left:2px}
.msg-thumb{display:block;width:120px;height:auto;border-radius:8px;margin:0 0 10px;background:#ece9e4}
.t10{display:flex;flex-direction:column;gap:10px}
.t10-row{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.t10-n{flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:var(--ink);color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums}
.t10-body{flex:1;min-width:0}
.t10-t{font-weight:600;font-size:15.5px;margin:2px 0 3px}
.t10-t a{color:var(--ink);text-decoration:none}
.t10-t a:hover{text-decoration:underline}
.t10-s{margin:0;color:#3a3f45;font-size:14px}
.t10-row .ts-tag{margin:0 0 4px}
.more{margin-top:6px}
.more .exp{background:#f6f8fb;border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:7px 11px;margin:7px 0 0;font-size:13.5px;color:#2a2f35}
.more .exp.loading{color:var(--muted);font-style:italic}
.more .exp.qa{border-left-color:var(--accent2);background:#f7f4fc}
.more .exp.qa .q{display:block;font-weight:600;color:#5a4e7a;margin-bottom:3px}
.card-actions{display:flex;gap:8px;margin-top:9px}
.mini{border:1px solid var(--line);background:var(--chip);border-radius:7px;padding:3px 10px;cursor:pointer;font-size:12.5px;color:#444}
.mini:hover{border-color:#d2cec7}
.ask-box{display:flex;gap:7px;margin-top:8px}
.ask-box .ask-in{flex:1;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font:inherit;background:#fff}
.ask-box .ask-in:focus{outline:none;border-color:var(--accent2)}
.headlines{list-style:none;margin:6px 0 0;padding:0}
.headlines li{padding:6px 0;border-top:1px solid var(--line);font-size:13.7px}
.headlines li:first-child{border-top:none}
.headlines a{color:var(--ink);text-decoration:none}
.headlines a:hover{text-decoration:underline}
.aim-wrap{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:10px}
.aim-wrap .aim-h{font-weight:600;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.aim-wrap .aim-h .tag{background:#eef4fb;color:var(--accent);font-size:11px;padding:2px 7px;border-radius:6px}
.tool{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}
.tool h3{margin:0 0 8px;font-size:14.5px}
.tool textarea,.tool input[type=text]{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;background:#fff;resize:vertical}
.btn{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13.5px}
.btn:hover{opacity:.92}
.row{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
.timer-display{font-size:34px;font-weight:600;letter-spacing:1px;font-variant-numeric:tabular-nums}
.list{list-style:none;margin:10px 0 0;padding:0}
.list li{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-top:1px solid var(--line);font-size:13.7px}
.list li:first-child{border-top:none}
.list .x{margin-left:auto;color:var(--muted);cursor:pointer;border:none;background:none;font-size:15px;line-height:1}
.list .when{color:var(--muted);font-size:12px}
.out{margin-top:10px;background:#f6f8fb;border-radius:8px;padding:10px 12px;font-size:13.7px;white-space:pre-wrap}
.empty{color:var(--muted);font-size:13px;font-style:italic}
.src{color:var(--muted);font-size:12px;margin-top:5px}
.src b{font-weight:600;color:#5a6473}
.card-when{color:var(--muted);font-size:11.5px;margin:0 0 6px;display:flex;align-items:center;gap:4px}
.refresh-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.refresh-bar .when{color:var(--muted);font-size:12px}
.verified{display:inline-block;background:#e9f5ee;color:var(--good);font-size:11px;padding:1px 7px;border-radius:6px;margin-bottom:8px}
.foot{color:var(--muted);font-size:12px;text-align:center;margin-top:26px}
@media (max-width:560px){
  body{font-size:15.5px;padding-bottom:74px}
  .wrap{padding:14px 12px 28px}
  h1{font-size:18px}
  .titlerow{align-items:flex-start}
  .affirm{font-size:13.5px}
  nav.tabs{position:fixed;left:0;right:0;bottom:0;z-index:30;margin:0;gap:0;flex-wrap:nowrap;background:var(--card);border-top:1px solid var(--line);border-bottom:none;padding:5px 4px;padding-bottom:calc(5px + env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(0,0,0,.06)}
  .tab{flex:1;flex-direction:column;gap:2px;border-radius:10px;padding:6px 2px;font-size:10.5px}
  .tab .ico{font-size:19px}
  .tab .lbl{white-space:nowrap}
  .tab.active{background:transparent;color:var(--accent)}
  .card{padding:13px 13px}
  .card-actions{gap:6px}
  .mini{padding:7px 11px;font-size:13px}
  .ask-box .ask-in{font-size:16px}
  .btn{padding:9px 14px}
  .tool input[type=text],.tool textarea{font-size:16px}
  .timer-display{font-size:40px}
  .more-menu{position:fixed;left:8px;right:8px;bottom:calc(64px + env(safe-area-inset-bottom));top:auto;min-width:0}
}
/* theme toggle */
.theme-btn{border:1px solid var(--line);background:var(--card);border-radius:8px;padding:4px 9px;cursor:pointer;font-size:14px;color:var(--muted);line-height:1}
.theme-btn:hover{color:var(--ink);border-color:#d8d5cf}
/* NEW badge + read state */
.badge-new{display:inline-block;background:var(--good);color:#fff;font-size:9.5px;font-weight:700;letter-spacing:.5px;padding:1px 6px;border-radius:5px;margin:0 0 6px;vertical-align:middle}
.card.read{opacity:.5}
.card.read .badge-new{display:none}
.act-read.on{color:var(--good);border-color:var(--good)}
/* "More" tab overflow menu */
.tab.more-btn{position:relative}
.more-menu{position:absolute;top:calc(100% + 6px);right:0;z-index:40;background:var(--card);border:1px solid var(--line);border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.12);padding:6px;display:none;flex-direction:column;gap:2px;min-width:150px}
.more-menu.open{display:flex}
.more-menu .tab{flex-direction:row;flex:none;width:100%;justify-content:flex-start;gap:8px;padding:10px 12px;font-size:14.5px;border-radius:8px;color:var(--ink)}
.more-menu .tab .ico{font-size:16px}
.more-menu .tab.active{background:var(--ink);color:#fff}
/* importance dots */
.imp{display:inline-block;width:9px;height:9px;border-radius:50%;flex:0 0 auto;margin-top:6px}
.imp-critical{background:#e0443e}
.imp-important{background:#e8912d}
.imp-interesting{background:var(--accent)}
.imp-noise{background:#b8bcc2}
.imp-inline{margin:0 6px 0 0;vertical-align:middle;margin-top:0}
/* why it matters */
.why{margin:6px 0 0;font-size:13.5px;color:#3a3f45;background:rgba(123,92,196,.08);border-left:3px solid var(--accent2);border-radius:0 8px 8px 0;padding:5px 10px}
.why b{color:var(--accent2)}
:root[data-theme="dark"] .why{background:rgba(169,140,224,.12);color:#d7dbe0}
.readtime{color:var(--muted);font-size:11.5px;margin:5px 0 0}
/* "Today in 30 seconds" glance box */
.glance{background:linear-gradient(135deg,#eef4fb,#f3effa);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin:0 0 16px}
:root[data-theme="dark"] .glance{background:linear-gradient(135deg,#1b2230,#221f33)}
.glance>summary{cursor:pointer;list-style:none;font-weight:700;font-size:13px;letter-spacing:.3px;color:var(--accent2)}
.glance>summary::-webkit-details-marker{display:none}
.glance-body{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.glance-row{display:flex;gap:10px;font-size:13.5px;line-height:1.4}
.glance-tag{flex:0 0 auto;width:84px;font-weight:700;color:var(--muted);text-transform:uppercase;font-size:10.5px;letter-spacing:.4px;padding-top:2px}
.glance-items{flex:1;color:var(--ink)}
.glance-list{gap:0}
.glance-line{display:flex;gap:9px;align-items:flex-start;font-size:13.5px;line-height:1.5;padding:7px 0;border-top:1px solid var(--line)}
.glance-line:first-child{border-top:none;padding-top:2px}
.glance-dot{flex:0 0 auto;color:var(--accent);font-weight:700;line-height:1.5}
.glance-tx{flex:1;color:var(--ink)}
/* category dropdowns (News) */
.cat{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:0 0 10px;overflow:hidden}
.cat>summary{cursor:pointer;list-style:none;padding:12px 14px;font-size:14.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px}
.cat>summary::-webkit-details-marker{display:none}
.cat>summary::after{content:"▾";margin-left:auto;color:var(--muted);font-weight:400}
.cat[open]>summary::after{content:"▴"}
.cat[open]>summary{border-bottom:1px solid var(--line)}
.cat-n{background:var(--chip);color:var(--muted);font-size:11px;font-weight:700;padding:1px 8px;border-radius:999px}
.cat-body{padding:4px 14px 8px}
.nb{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-top:1px solid var(--line)}
.nb:first-child{border-top:none}
.nb.read{opacity:.5}
.nb-dot{flex:0 0 auto;margin-top:4px}
.nb-body{flex:1;min-width:0}
.nb-t{font-weight:600;font-size:14.5px;margin:0 0 3px}
.nb-t a{color:var(--ink);text-decoration:none}
.nb-t a:hover{text-decoration:underline}
.nb-s{margin:0;color:#3a3f45;font-size:13.5px}
:root[data-theme="dark"] .nb-s{color:#c7ccd2}
.eng{display:inline-block;color:var(--muted);font-size:11.5px;font-variant-numeric:tabular-nums}
.eng b{color:#5a6473;font-weight:600}
:root[data-theme="dark"] .eng b{color:#aab2bd}
/* dark-mode fixes for light-hardcoded components */
:root[data-theme="dark"] .affirm,
:root[data-theme="dark"] .msg-card{background:linear-gradient(135deg,#241f33,#1b2230)}
:root[data-theme="dark"] .eli{background:#2a2519;border-color:#3a3320;color:#d8c79a}
:root[data-theme="dark"] .eli b{color:#e3cf96}
:root[data-theme="dark"] .pts{background:#1a1d22}
:root[data-theme="dark"] .more .exp{background:#1b2128}
:root[data-theme="dark"] .more .exp.qa{background:#221d30}
:root[data-theme="dark"] .out,
:root[data-theme="dark"] .t10-row{background:var(--card)}
:root[data-theme="dark"] .ts-tag,
:root[data-theme="dark"] .tw a.tw-time{background:#23303f;color:var(--accent)}
:root[data-theme="dark"] .verified{background:#15301f;color:var(--good)}
:root[data-theme="dark"] .ask-box .ask-in,
:root[data-theme="dark"] .tool textarea,
:root[data-theme="dark"] .tool input[type=text]{background:#15171a;color:var(--ink)}
:root[data-theme="dark"] .play{background:rgba(0,0,0,.7)}
/* hide AI-only controls when not running inside the Claude app */
body.no-ai .ask-box{display:none} body.no-ai .act-ask::after,body.no-ai .act-more::after{content:" \2197"}

/* ---- dark-mode readability fixes (hardcoded body-text colors were too dark on dark bg) ---- */
:root[data-theme="dark"] .card .s,:root[data-theme="dark"] .pt .pt-s,:root[data-theme="dark"] .t10-s{color:#cdd2d8}
:root[data-theme="dark"] .msg-body{color:#dde0e5}
:root[data-theme="dark"] .tw .tw-said{color:#e8eaed}
:root[data-theme="dark"] .mini{color:#cdd2d8}
:root[data-theme="dark"] .src b,:root[data-theme="dark"] .ts-seen b{color:#aab2bc}
:root[data-theme="dark"] .headlines a,:root[data-theme="dark"] .card .t a{color:#e8eaed}
@media (prefers-color-scheme: dark){ :root:not([data-theme="light"]) .card .s,:root:not([data-theme="light"]) .pt .pt-s,:root:not([data-theme="light"]) .t10-s{color:#cdd2d8}
 :root:not([data-theme="light"]) .msg-body{color:#dde0e5}
 :root:not([data-theme="light"]) .tw .tw-said{color:#e8eaed}
 :root:not([data-theme="light"]) .mini{color:#cdd2d8}
 :root:not([data-theme="light"]) .src b,:root:not([data-theme="light"]) .ts-seen b{color:#aab2bc}
 :root:not([data-theme="light"]) .why{color:#d7dbe0} }
/* e-paper banner */
.epaper-banner{display:flex;align-items:center;gap:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;text-decoration:none;border-radius:12px;padding:12px 15px;margin:0 0 12px;box-shadow:0 3px 12px rgba(0,0,0,.10)}
.epaper-banner .epaper-ic{font-size:22px;line-height:1}
.epaper-banner .epaper-tx{display:flex;flex-direction:column;line-height:1.25}
.epaper-banner .epaper-tx b{font-size:14.5px;font-weight:600;color:#fff}
.epaper-banner .epaper-sub{font-size:12px;opacity:.92}
.epaper-banner .epaper-arrow{margin-left:auto;font-size:18px;opacity:.9}

.aud-intro{font-size:13px;color:var(--muted);margin:2px 0 13px;line-height:1.5}
.aud-card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin:0 0 12px}
.aud-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.aud-title{font-weight:700;font-size:15.5px}
.aud-meta{font-size:12px;color:var(--muted);white-space:nowrap}
.aud-now{font-size:13px;margin:7px 0 9px;color:var(--ink);min-height:18px;line-height:1.4}
.aud-track{height:6px;background:var(--line);border-radius:5px;overflow:hidden}

  if(s < 3600){ const n=Math.floor(s/60); return n+" min"+(n>1?"s":"")+" ago"; }
  if(s < 86400){ const n=Math.floor(s/3600); return n+" hour"+(n>1?"s":"")+" ago"; }
  const days = Math.floor(s/86400);
  if(days === 1) return "yesterday";
  if(days < 7) return days+" days ago";
  if(days < 30){ const n=Math.floor(days/7); return n+" week"+(n>1?"s":"")+" ago"; }
  return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
}

function fmtAud(s){ s=Math.max(0,Math.floor(s||0)); var m=Math.floor(s/60), x=s%60; return m+":"+(x<10?"0":"")+x; }

      '<div class="aud-head"><span class="aud-title">'+esc(sec.label)+'</span><span class="aud-meta">'+chs.length+' items · '+fmtAud(sec.dur)+'</span></div>'+

    function idx(){ var t=au.currentTime,i=0; for(var k=0;k<chs.length;k++){ if(chs[k].start<=t+0.3) i=k; } return i; }
    function paint(){ var d=au.duration||sec.dur||0; fill.style.width=(d?Math.min(100,au.currentTime/d*100):0)+"%"; cur.textContent=fmtAud(au.currentTime); var i=idx(); if(chs[i]) now.textContent=(i+1)+"/"+chs.length+" · "+chs[i].t; }

    au.addEventListener("pause",function(){ playBtn.textContent="▶"; });
    au.addEventListener("ended",function(){ playBtn.textContent="▶"; var nx=audios[secIdx+1]; if(nx){ var nc=nx.closest(".aud-card"); if(nc&&nc.scrollIntoView){ try{ nc.scrollIntoView({behavior:"smooth",block:"center"}); }catch(e){} } nx.currentTime=0; var pr=nx.play(); if(pr&&pr.catch) pr.catch(function(){}); } });
    card.querySelector(".aud-ctrls").addEventListener("click",function(e){ var b=e.target.closest("button"); if(!b) return; var a=b.dataset.a, i=idx();
      if(a==="play"){ if(au.paused) au.play(); else au.pause(); }

function renderSave(){
  const ul=document.getElementById("saveList"); const items=store.get("saved",[]);
  ul.innerHTML = items.length ? "" : '<li class="empty">Nothing saved yet.</li>';
  items.forEach((it,i)=>{
    const li=document.createElement("li");
    li.innerHTML = `<span>${esc(it)}</span><button class="x" title="remove">×</button>`;
    li.querySelector(".x").onclick=()=>{ const a=store.get("saved",[]); a.splice(i,1); store.set("saved",a); renderSave(); };
    ul.appendChild(li);
  });
}
function addSave(v){ if(!v) return; const a=store.get("saved",[]); a.unshift(v); store.set("saved",a); renderSave(); }
document.getElementById("saveGo").onclick=()=>{ const el=document.getElementById("saveIn"); addSave(el.value.trim()); el.value=""; };
document.getElementById("saveIn").addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("saveGo").click(); });

function renderGrat(){
  const ul=document.getElementById("gratList"); const items=store.get("grat",[]);
  ul.innerHTML = items.length ? "" : '<li class="empty">No entries yet — add one good thing.</li>';
  items.forEach((it,i)=>{
    const li=document.createElement("li");
    li.innerHTML = `<span>${esc(it.text)}<br><span class="when">${esc(it.when)}</span></span><button class="x">×</button>`;
    li.querySelector(".x").onclick=()=>{ const a=store.get("grat",[]); a.splice(i,1); store.set("grat",a); renderGrat(); };
    ul.appendChild(li);
  });
}
document.getElementById("gratGo").onclick=()=>{
  const el=document.getElementById("gratIn"); const v=el.value.trim(); if(!v) return;
  const a=store.get("grat",[]); a.unshift({text:v, when:new Date().toLocaleDateString()}); store.set("grat",a); el.value=""; renderGrat();
};
document.getElementById("gratIn").addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("gratGo").click(); });

/*FRESH_GUARD_START*/
/* Freshness rule: show only items within 24h of the last refresh (DATA.updated),
   so nothing older than a day is displayed, and nothing vanishes mid-day as the
   clock moves. NO same-day dedup — pressing Update just re-pulls the last 24h and
   shows everything in it, even if it was shown before.
   DATA.mindset (persist latest gist) and DATA.elon (a labelled daily recap) are exempt. */
(function enforceFreshness(){
  var DAY_MS = 24*60*60*1000;
  var ref = Date.parse(DATA && DATA.updated); if(isNaN(ref)) ref = Date.now();
  var PLACE = /nothing new|nothing major|no news|no relevant|no notable|no major|no standout|no items|not available|no entries|no new video/i;
  function isPlace(it){ return !!it && PLACE.test(String((it&&(it.t||it.author))||"")); }
  function fresh(it){
    if(isPlace(it)) return true;
    var d = pubDate(it); if(!d) return false;
    var t = new Date(d).getTime(); if(isNaN(t)) return false;
    return (ref - t) <= DAY_MS;
  }
  function filt(a){ return Array.isArray(a) ? a.filter(fresh) : a; }

  // News: strict 24h within each subject category (keep placeholders).
  if(DATA.news && Array.isArray(DATA.news.cats)) DATA.news.cats.forEach(function(c){ if(c) c.items=filt(c.items); });
  DATA.elonNews = filt(DATA.elonNews);
  if(DATA.mind && Array.isArray(DATA.mind.groups)) DATA.mind.groups.forEach(function(g){ if(g) g.items=filt(g.items); });
  /* DATA.elon is a labelled daily recap and DATA.mindset persists — both still exempt. DATA.science is now capped at 48h so nothing older than ~2 days lingers. */
  if(DATA.science && Array.isArray(DATA.science.items)){ DATA.science.items = DATA.science.items.filter(function(it){ if(isPlace(it)) return true; var d=pubDate(it); if(!d) return false; var t=new Date(d).getTime(); if(isNaN(t)) return false; return (ref - t) <= 2*DAY_MS; }); if(!DATA.science.items.length){ DATA.science.items=[{t:"Nothing new today", s:"No fresh science breakthrough surfaced in the last couple of days.", url:"", published:""}]; } }

  if(DATA.youtube && Array.isArray(DATA.youtube.groups)){
    var groups=[];
    DATA.youtube.groups.forEach(function(g){
      if(!g) return;
      if(g.type==="aim"){
        g.keys = filt(g.keys||[]);
        g.count = g.keys.length;
        if(g.keys.length || (g.headlines && g.headlines.length)) groups.push(g);
      } else {
        g.items = filt(g.items||[]);
        if(g.items.length) groups.push(g);
      }
    });
    DATA.youtube.groups = groups;
    DATA.youtube.count = groups.reduce(function(n,g){ return n + ((g.items&&g.items.length)||(g.keys&&g.keys.length)||0); },0);
    if(!groups.length){
      DATA.youtube.groups = [{h:"YouTube", items:[{t:"Nothing new in the last 24h", s:"No relevant uploads from your subscriptions in the last 24 hours.", url:"", published:""}]}];
      DATA.youtube.count = 0;
    }
  }
})();
/*FRESH_GUARD_END*/
