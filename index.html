.tab .ico{font-size:14px;line-height:1}
.tab:hover{color:var(--ink)}
.tab.active{background:var(--ink);color:#fff}
.panel{display:none;animation:fade .2s ease}

.ts-seen{color:var(--muted);font-size:11.5px;margin:6px 0 0}
.ts-seen b{color:#5a6473;font-weight:600}
.msg-card{background:linear-gradient(135deg,#f3effa,#eef4fb);border:1px solid var(--line);border-left:4px solid var(--accent2);border-radius:14px;padding:16px 18px;margin-bottom:14px}

    <div class="affirm">

      <span class="a-text" id="affirm"></span>
      <button class="icon-btn" id="shuffleAff" title="New one">↻</button>
    </div>

      <div class="row"><button class="btn" id="eliGo">Explain simply</button></div>
      <div class="out" id="eliOut" style="display:none"></div>
    </div>
    <div class="tool">

      <div class="row">
        <button class="btn" id="tStart">Start</button>
        <button class="mini" id="tPause">Pause</button>
        <button class="mini" id="tReset">Reset</button>
        <button class="mini" data-min="25">25</button>
        <button class="mini" data-min="15">15</button>
        <button class="mini" data-min="5">5</button>
      </div>
    </div>
    <div class="tool">
      <h3>🔖 Save for later</h3>
      <div class="row">
        <input type="text" id="saveIn" placeholder="Paste a link or note…" style="flex:1">
        <button class="btn" id="saveGo">Add</button>
      </div>
      <ul class="list" id="saveList"></ul>
    </div>
    <div class="tool">
      <h3>🌱 Gratitude / win log</h3>
      <div class="row">
        <input type="text" id="gratIn" placeholder="One good thing today…" style="flex:1">
        <button class="btn" id="gratGo">Log</button>
      </div>
      <ul class="list" id="gratList"></ul>
    </div>
  </section>

  <div class="foot" id="foot"></div>
</div>

const esc = s => (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
// derive a publish date from a URL when the item doesn't carry one explicitly
function urlDate(u){
  if(!u) return null;
  let m;
  m = u.match(/\/(20\d{2})\/(\d{2})\/(\d{2})(?:[\/?#]|$)/); if(m) return `${m[1]}-${m[2]}-${m[3]}`;      // /YYYY/MM/DD/
  m = u.match(/\/(20\d{2})-(\d{2})-(\d{2})\//);            if(m) return `${m[1]}-${m[2]}-${m[3]}`;      // /YYYY-MM-DD/
  m = u.match(/\/(20\d{2})(\d{2})(\d{2})\//);              if(m) return `${m[1]}-${m[2]}-${m[3]}`;      // /YYYYMMDD/
  m = u.match(/\/releases\/20\d{2}\/\d{2}\/(\d{2})(\d{2})(\d{2})\d*\.htm/); if(m) return `20${m[1]}-${m[2]}-${m[3]}`; // ScienceDaily filename YYMMDD
  return null;
}
// the publish moment for an item: explicit field wins, else parsed from its URL
function pubDate(item){ return (item && (item.published || urlDate(item.url))) || null; }
// human "how long ago", recomputed every page load
function relAge(v){
  if(!v) return "";
  const d = new Date(v); if(isNaN(d.getTime())) return "";
  let s = Math.floor((Date.now() - d.getTime())/1000); if(s < 0) s = 0;
  if(s < 60) return "just now";
  if(s < 3600){ const n=Math.floor(s/60); return n+" min"+(n>1?"s":"")+" ago"; }
  if(s < 86400){ const n=Math.floor(s/3600); return n+" hour"+(n>1?"s":"")+" ago"; }
  const days = Math.floor(s/86400);
  if(days === 1) return "yesterday";
  if(days < 7) return days+" days ago";
  if(days < 30){ const n=Math.floor(days/7); return n+" week"+(n>1?"s":"")+" ago"; }
  return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
}
const ord = n => ["","first","second","third","fourth","fifth","sixth","seventh"][n] || (n+"th");

    (item.s ? `<p class="s">${esc(item.s)}</p>` : "") +

  groups.forEach(sec=>{ if(sec.items&&sec.items.length){ any=true; const g=group(sec.h); sec.items.forEach(it=>g.appendChild(card(it, M.updated))); p.appendChild(g); } });
  if(!any){ const e=document.createElement("p"); e.className="empty"; e.textContent="No items loaded yet — tap Refresh or check back after the next daily update."; p.appendChild(e); }
  const when=document.getElementById("mindWhen");
  if(M.updated && when) when.textContent="Updated "+new Date(M.updated).toLocaleString();
  const rb=document.getElementById("mindRefresh");
  if(rb) rb.onclick=async ()=>{
    if(!(window.cowork && window.cowork.runScheduledTask)){ location.reload(); return; }
    rb.disabled=true; const o=rb.textContent; rb.textContent="Refreshing…";
    try{ await window.cowork.runScheduledTask("mind-breakthroughs"); when.textContent="Refreshing in the background — reload this view in a minute or two."; }
    catch(e){ when.textContent="Couldn't start a refresh here — it updates automatically each day."; }
    setTimeout(()=>{ rb.disabled=false; rb.textContent=o; },4000);
  };
}
function renderYouTube(){
  const p = document.getElementById("p-youtube"); p.innerHTML="";
  const intro=document.createElement("p"); intro.className="empty"; intro.textContent=DATA.youtube.count+" relevant videos in the last 24h, curated below.";
  p.appendChild(intro);
  DATA.youtube.groups.forEach(sec=>{
    if(sec.type==="aim"){
      const g=group(null);
      const w=document.createElement("div"); w.className="aim-wrap";
      w.innerHTML=`<p class="aim-h">${esc(sec.h)} <span class="tag">${sec.count} videos · condensed</span></p>`;
      sec.keys.forEach(it=> w.appendChild(card(it, DATA.updated)));
      if(sec.headlines && sec.headlines.length){
        const ul=document.createElement("ul"); ul.className="headlines";
        sec.headlines.forEach(h=>{ const li=document.createElement("li"); li.innerHTML = h.url?`<a href="${esc(h.url)}" target="_blank" rel="noopener">${esc(h.t)}</a>`:esc(h.t); ul.appendChild(li); });
        w.appendChild(ul);
      }
      g.appendChild(w); p.appendChild(g);
    } else {
      const g=group(sec.h); sec.items.forEach(it=>g.appendChild(card(it, DATA.updated))); p.appendChild(g);
    }
  });
}
function renderElon(){

  else { const e=document.createElement("p"); e.className="empty"; e.textContent="No news loaded yet — tap Refresh."; ng.appendChild(e); }

function renderLoa(){
  const p=document.getElementById("p-loa"); p.innerHTML="";
  const M = DATA.mindset || {};
  const msgs = M.messages || [];
  const intro=document.createElement("p"); intro.className="empty";
  intro.textContent = "Each teacher's latest video, distilled into one plain-language message — what they actually meant." + (M.updated ? " · updated "+new Date(M.updated).toLocaleString() : "");
  p.appendChild(intro);
  const g=group(null);
  if(msgs.length){
    msgs.forEach(m=>{
      const d=document.createElement("div"); d.className="msg-card";
      const link = m.url ? `<div class="msg-link"><a href="${esc(m.url)}" target="_blank" rel="noopener">watch the latest ▸</a></div>` : "";
      const age = relAge(pubDate(m));
      d.innerHTML =
        `<div class="msg-author">${esc(m.author)}${m.title?` · <span class="msg-title">${esc(m.title)}</span>`:""}</div>`+
        (age ? `<p class="card-when" title="published ${esc(pubDate(m))}">🕒 ${esc(age)}</p>` : "")+
        `<p class="msg-body">${esc(m.msg)}</p>`+ link;
      g.appendChild(d);
    });
  } else {
    const e=document.createElement("p"); e.className="empty"; e.textContent="No messages yet — they refresh each morning."; g.appendChild(e);
  }
  p.appendChild(g);
}
const nav=document.getElementById("tabs");
TABS.forEach(t=>{
  const b=document.createElement("button"); b.className="tab"; b.dataset.id=t.id;
  b.innerHTML=`<span class="ico">${t.icon}</span><span class="lbl">${t.label}</span>`;
  b.onclick=()=>activate(t.id); nav.appendChild(b);
});
function activate(id){
  TABS.forEach(t=>{
    document.getElementById("p-"+t.id).classList.toggle("active", t.id===id);
  });
  [...nav.children].forEach(b=>b.classList.toggle("active", b.dataset.id===id));
  store.set("tab", id);
}

document.getElementById("eliGo").onclick = async ()=>{
  const v=document.getElementById("eliIn").value.trim(); if(!v) return;
  const out=document.getElementById("eliOut");
  if(!(window.cowork && window.cowork.askClaude)){
    out.style.display="block"; out.textContent="Opening a web search…";
    window.open("https://www.google.com/search?q="+encodeURIComponent("explain like I'm 5: "+v), "_blank", "noopener");
    return;
  }
  out.style.display="block"; out.textContent="thinking…";
  try{
    const res=await window.cowork.askClaude("Explain the following in plain, simple language like I'm 5 — 2-4 short sentences, friendly and concrete:\n\n"+v, []);
    out.textContent = (typeof res==="string"?res:(res&&(res.text||res.content))||String(res)).trim();
  }catch(e){ out.textContent="Couldn't generate an explanation right now — try the web search instead."; }
};

let tSecs=25*60, tInt=null, tBase=25*60;
const tDisp=document.getElementById("tDisp");
function tShow(){ const m=String(Math.floor(tSecs/60)).padStart(2,"0"), s=String(tSecs%60).padStart(2,"0"); tDisp.textContent=m+":"+s; }
document.getElementById("tStart").onclick=()=>{ if(tInt) return; tInt=setInterval(()=>{ if(tSecs>0){tSecs--;tShow();} else {clearInterval(tInt);tInt=null;tDisp.textContent="done ✓";} },1000); };
document.getElementById("tPause").onclick=()=>{ clearInterval(tInt); tInt=null; };
document.getElementById("tReset").onclick=()=>{ clearInterval(tInt); tInt=null; tSecs=tBase; tShow(); };
document.querySelectorAll("[data-min]").forEach(b=> b.onclick=()=>{ clearInterval(tInt); tInt=null; tBase=tSecs=parseInt(b.dataset.min,10)*60; tShow(); });
tShow();

function renderSave(){
  const ul=document.getElementById("saveList"); const items=store.get("saved",[]);
  ul.innerHTML = items.length ? "" : '<li class="empty">Nothing saved yet.</li>';
  items.forEach((it,i)=>{
    const li=document.createElement("li");
    li.innerHTML = `<span>${esc(it)}</span><button class="x" title="remove">×</button>`;
    li.querySelector(".x").onclick=()=>{ const a=store.get("saved",[]); a.splice(i,1); store.set("saved",a); renderSave(); };
    ul.appendChild(li);
  });
}
function addSave(v){ if(!v) return; const a=store.get("saved",[]); a.unshift(v); store.set("saved",a); renderSave(); }
document.getElementById("saveGo").onclick=()=>{ const el=document.getElementById("saveIn"); addSave(el.value.trim()); el.value=""; };
document.getElementById("saveIn").addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("saveGo").click(); });

function renderGrat(){
  const ul=document.getElementById("gratList"); const items=store.get("grat",[]);
  ul.innerHTML = items.length ? "" : '<li class="empty">No entries yet — add one good thing.</li>';
  items.forEach((it,i)=>{
    const li=document.createElement("li");
    li.innerHTML = `<span>${esc(it.text)}<br><span class="when">${esc(it.when)}</span></span><button class="x">×</button>`;
    li.querySelector(".x").onclick=()=>{ const a=store.get("grat",[]); a.splice(i,1); store.set("grat",a); renderGrat(); };
    ul.appendChild(li);
  });
}
document.getElementById("gratGo").onclick=()=>{
  const el=document.getElementById("gratIn"); const v=el.value.trim(); if(!v) return;
  const a=store.get("grat",[]); a.unshift({text:v, when:new Date().toLocaleDateString()}); store.set("grat",a); el.value=""; renderGrat();
};
document.getElementById("gratIn").addEventListener("keydown",e=>{ if(e.key==="Enter") document.getElementById("gratGo").click(); });
